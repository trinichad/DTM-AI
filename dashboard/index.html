<html lang="en" class="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MSP AI — MSP Operations</title>
  <link id="favicon" rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%236366f1'/%3E%3Cstop offset='1' stop-color='%238b5cf6'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='14' fill='url(%23g)'/%3E%3Ctext x='32' y='44' text-anchor='middle' font-family='Arial,Helvetica,sans-serif' font-size='34' font-weight='800' fill='white'%3ED%3C/text%3E%3C/svg%3E">

  <script>
    tailwind.config = { darkMode: 'class', theme: { extend: {
      colors: { ink:'#080b13', panel:'#0e141f', edge:'#202c40', accent:'#6366f1', accent2:'#8b5cf6',
                ok:'#34d399', warn:'#fbbf24', danger:'#fb7185', info:'#38bdf8' },
      fontFamily: { sans: ['Inter','ui-sans-serif','system-ui','sans-serif'] },
      keyframes: {
        fadeup: { '0%':{opacity:0,transform:'translateY(8px)'}, '100%':{opacity:1,transform:'translateY(0)'} },
        pulseDot: { '0%,100%':{opacity:1}, '50%':{opacity:.3} },
        blink: { '0%,80%,100%':{opacity:.2}, '40%':{opacity:1} },
      },
      animation: { fadeup:'fadeup .35s cubic-bezier(.4,0,.2,1) both', pulseDot:'pulseDot 1.8s ease-in-out infinite' },
    } } };

  <style>
    :root{--ease:cubic-bezier(.4,0,.2,1);--t:180ms}
    html{color-scheme:dark}
    body{font-family:Inter,system-ui,sans-serif;background:
      radial-gradient(1150px 620px at 12% -8%, rgba(99,102,241,.13), transparent 60%),
      radial-gradient(950px 520px at 100% 0%, rgba(139,92,246,.10), transparent 55%),
      #06070d; min-height:100vh;}
    .tnum{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
    h1,h2,.heading{letter-spacing:-.011em}
    ::-webkit-scrollbar{width:10px;height:10px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:#212d44;border-radius:9px;border:2px solid transparent;background-clip:padding-box}
    ::-webkit-scrollbar-thumb:hover{background:#33415c;background-clip:padding-box}

    /* lift the dimmest tertiary text to meet ~4.5:1 on the dark base */
    .text-slate-600{color:#6e7d96 !important}

    /* visible keyboard focus everywhere — wins over the blanket focus:outline-none utilities.
       Inputs signal focus via their own border+ring instead (set below), so suppress the outline there. */
    :focus-visible{outline:2px solid rgba(129,140,248,.95) !important;outline-offset:2px}
    input:focus-visible,textarea:focus-visible,select:focus-visible{outline:none !important}
    input:focus,textarea:focus,select:focus{border-color:#6366f1 !important;box-shadow:0 0 0 3px rgba(99,102,241,.20)}

    .glass{background:rgba(13,19,30,.72);backdrop-filter:blur(16px) saturate(140%);-webkit-backdrop-filter:blur(16px) saturate(140%)}
    .pill{font-size:11px;padding:2px 9px;border-radius:9999px;font-weight:600;letter-spacing:.02em;line-height:1.45}
    .card{background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.012));
      border:1px solid rgba(255,255,255,.08);border-radius:16px;
      box-shadow:inset 0 1px 0 0 rgba(255,255,255,.045), 0 10px 30px -20px rgba(0,0,0,.7)}
    .card-hover{transition:transform var(--t) var(--ease),border-color var(--t) var(--ease),box-shadow var(--t) var(--ease)}
    .card-hover:hover{transform:translateY(-2px);border-color:rgba(99,102,241,.45);
      box-shadow:0 14px 44px -14px rgba(99,102,241,.4)}
    .grad{background:linear-gradient(135deg,#6d6cf6,#8b5cf6);transition:filter var(--t) var(--ease),transform var(--t) var(--ease),box-shadow var(--t) var(--ease)}
    .grad:hover{filter:brightness(1.08)}
    .grad:active{transform:translateY(1px)}
    .grad-text{background:linear-gradient(135deg,#a5b4fc,#c4b5fd);-webkit-background-clip:text;background-clip:text;color:transparent}
    button:not(:disabled),[role=button]{cursor:pointer}
    button:disabled{cursor:not-allowed}
    .switch{position:relative;width:40px;height:22px;border-radius:9999px;background:#26324a;transition:.2s var(--ease);cursor:pointer;flex:none}
    .switch::after{content:'';position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:.2s var(--ease);box-shadow:0 1px 2px rgba(0,0,0,.45)}
    .switch.on{background:linear-gradient(135deg,#6d6cf6,#8b5cf6)}
    .switch.on::after{transform:translateX(18px)}
    .switch.disabled{opacity:.35;cursor:not-allowed}
    [data-lucide]{width:1em;height:1em;display:inline-block;vertical-align:-.125em}
    .navi{display:flex;align-items:center;gap:.6rem;padding:.55rem .7rem;border-radius:11px;cursor:pointer;color:#94a3b8;font-weight:500;font-size:.875rem;position:relative;transition:.15s var(--ease)}
    .navi:hover{background:rgba(255,255,255,.05);color:#e2e8f0}
    .navi.active{background:linear-gradient(90deg,rgba(99,102,241,.20),rgba(139,92,246,.06));color:#fff}
    .navi.active::before{content:'';position:absolute;left:0;top:18%;height:64%;width:3px;border-radius:3px;background:linear-gradient(180deg,#6366f1,#8b5cf6)}
    /* collapsed (icon-only) sidebar — toggled by the panel button in the header */
    #sideBar{transition:width .18s var(--ease)}
    #sideBar.mini{width:64px}
    #sideBar.mini .side-x{display:none}
    #sideBar.mini #brandRow{padding-left:0;padding-right:0;justify-content:center}
    #sideBar.mini .navi{justify-content:center;padding:.55rem 0}
    #sideBar.mini .navi span{display:none}
    #sideBar.mini #userCard{justify-content:center;padding:.5rem 0}
    #sideBar.mini #sysRow{justify-content:center;padding:0}
    #sideBar.mini #sysRow #logout{margin-left:0}

    /* ── the donor "Modern Dark (Cinema)" surface ───────────────────────── */
    /* ambient drifting light blobs — the cinematic depth cue behind the app */
    @keyframes drift{0%{transform:translate(0,0) scale(1)}50%{transform:translate(40px,-30px) scale(1.15)}100%{transform:translate(0,0) scale(1)}}
    .blob{position:fixed;border-radius:9999px;filter:blur(90px);opacity:.16;pointer-events:none;z-index:-1;animation:drift 22s var(--ease) infinite}

    /* message entrance — a soft springy rise */
    @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .rise{animation:rise .45s cubic-bezier(.16,1,.3,1) both}

    /* assistant "thinking" — three bouncing dots */
    @keyframes bounceDot{0%,80%,100%{transform:translateY(0);opacity:.4}40%{transform:translateY(-5px);opacity:1}}
    .typing{display:inline-flex;align-items:center;height:1.2em}
    .typing span{display:inline-block;width:6px;height:6px;border-radius:9999px;background:#8a8f98;margin:0 2px;animation:bounceDot 1.2s infinite}
    .typing span:nth-child(2){animation-delay:.15s}
    .typing span:nth-child(3){animation-delay:.3s}

    /* chat bubbles — name label above, accent inset ring on the assistant */
    .chat-row{display:flex;gap:.75rem}
    .chat-name{font-size:11px;color:#6e7d96;margin:0 0 4px 4px}
    .bub{border-radius:18px;padding:11px 16px;font-size:14.5px;line-height:1.6}
    .bub-you{background:rgba(255,255,255,.06)}
    /* assistant accent follows the selected agent via --ca-* vars set on the chat root */
    .bub-ai{background:rgba(255,255,255,.028);box-shadow:inset 0 0 0 1px var(--ca-ring,rgba(139,92,246,.22))}
    .prose-chat{line-height:1.65;word-break:break-word}
    .prose-chat code{font-family:ui-monospace,monospace;font-size:.85em;background:rgba(255,255,255,.06);padding:.1em .35em;border-radius:6px}

    /* citation chips — little monospace source tags */
    .cite{font-size:10px;font-family:ui-monospace,monospace;padding:2px 7px;border-radius:7px;background:rgba(255,255,255,.05);color:#8a8f98;display:inline-flex;align-items:center;gap:4px}

    /* composer — glass pill that lights up with an accent glow on focus */
    .composer{border-radius:18px;transition:box-shadow var(--t) var(--ease),border-color var(--t) var(--ease)}
    .composer:focus-within{box-shadow:0 0 0 1px var(--ca-45,rgba(99,102,241,.45)),0 14px 44px var(--ca-16,rgba(99,102,241,.16))}

    /* chat header control buttons (New / History / Activity …) */
    .hbtn{height:36px;padding:0 12px;border-radius:10px;font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:6px;color:#8a8f98;background:rgba(255,255,255,.04);transition:.15s var(--ease);white-space:nowrap}
    .hbtn:hover{color:#e2e8f0;background:rgba(255,255,255,.08)}
    .hbtn-accent{color:#a5b4fc;background:rgba(99,102,241,.16);box-shadow:inset 0 0 0 1px rgba(99,102,241,.38)}
    .hbtn-accent:hover{color:#c7d2fe;background:rgba(99,102,241,.24)}

    /* slide-over drawer (History / Activity) */
    .drawer-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(2px);z-index:60;opacity:0;transition:opacity .2s var(--ease)}
    .drawer-backdrop.show{opacity:1}
    .drawer{position:fixed;top:0;right:0;height:100%;width:380px;max-width:92vw;z-index:61;display:flex;flex-direction:column;
      background:rgba(11,15,24,.94);backdrop-filter:blur(22px) saturate(140%);border-left:1px solid rgba(255,255,255,.1);
      transform:translateX(100%);transition:transform .26s var(--ease);box-shadow:-24px 0 64px rgba(0,0,0,.55)}
    .drawer.show{transform:translateX(0)}

    /* slash-command palette above the composer */
    .slash{position:absolute;left:0;right:0;bottom:100%;margin-bottom:8px;border-radius:14px;overflow:hidden;z-index:30;
      background:#0d1018;box-shadow:0 16px 50px rgba(0,0,0,.6),inset 0 0 0 1px rgba(99,102,241,.32)}
    .slash-head{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:#595e68;padding:8px 14px;border-bottom:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.02)}
    .slash-item{display:flex;align-items:baseline;gap:10px;padding:9px 14px;cursor:pointer}
    .slash-item.sel{background:rgba(99,102,241,.18)}
    .slash-cmd{font-family:ui-monospace,monospace;font-size:13px;color:#a5b4fc}
    .slash-desc{font-size:11px;color:#8a8f98}

    /* respect reduced-motion: kill animation + transition + smooth scroll */
    @media (prefers-reduced-motion: reduce){
      *,*::before,*::after{animation-duration:.001ms !important;animation-iteration-count:1 !important;
        transition-duration:.001ms !important;scroll-behavior:auto !important}
    }
  </style>
</head>
<body class="text-slate-200 antialiased">

<!-- ambient cinema blobs (decorative, behind everything) -->

<div class="blob" style="width:480px;height:480px;right:-150px;top:8%;background:#8b5cf6;animation-delay:-8s"></div>

<!-- LOGIN -->

<script>
const $ = s => document.querySelector(s);
let TENANT='*', current='overview';
const NAV=[['overview','Overview','layout-dashboard'],['chat','Chat','message-square'],
  ['agents','Agents','users-round'],['board','Delegation','layout-grid'],
  ['integrations','Integrations','plug-zap'],['capabilities','Capabilities','sliders-horizontal'],
  ['skills','Skills','graduation-cap'],['memory','Memory','brain'],
  ['build','Build','hammer'],['files','Files','folder-open'],
  ['terminal','Terminal','terminal'],['audit','Audit','scroll-text']];
const SUB={overview:'Live health across your clients',chat:'Ask about a client — read-only',
  agents:'Your specialist team — souls, roles & memory',
  board:'Watch & assign work across your specialist team',
  integrations:'Connections, knowledge & credentials',capabilities:'Primitives the AI may use',
  skills:'Reusable procedures the AI has saved',memory:'Knowledge base & per-client notes',
  build:'Draft new tools — sandboxed, you approve',
  files:'Browse, edit & manage files on the server — admin only',
  terminal:'Run commands on the server — admin only, audited',
  audit:'Every action, logged',settings:'Account & users'};
let ME=null, MODEL=localStorage.getItem('mspai_chat_model')||'';   // '' = Auto (use the agent's Crew-Studio brain)
// agent accents (Identity tab) — also theme the chat when that agent is selected
const ACCENT_HEX={violet:'#8b5cf6',pink:'#ec4899',amber:'#f59e0b',emerald:'#10b981',orange:'#f97316',sky:'#0ea5e9',rose:'#f43f5e',cyan:'#06b6d4',lime:'#84cc16'};
const agentHex=a=>ACCENT_HEX[a&&a.accent]||'#8b5cf6';
let AGENTS=[];        // cached roster for the chat crew picker
let CHAT_AGENT=null;  // who you're talking to (defaults to the manager)
let TERM_CLEANUP=null;   // disposes the live xterm + WebSocket when leaving the Terminal tab
let STREAM=null;   // in-flight chat turn, at module scope so it survives tab switches
// Chat history lives on the SERVER now (per-user, multi-conversation) — it persists across
// devices/browsers until a conversation is explicitly deleted, like ChatGPT/Claude.
let CONV=null;   // current conversation id (null = unsaved new chat)
let MSGS=[];     // current conversation's messages, normalised for rendering
let CONVS=[];    // cached sidebar list of the user's conversations
// Map a stored message {role,content,meta} to the shape bubble()/aiHtml() expect.
function normMsg(m){ if(m.role==='user') return {role:'user',text:m.content,ts:m.created_at};
  const meta=m.meta||{}; return {role:'assistant',answer:m.content||'',tools:meta.tools||[],
    citations:meta.citations||[],suggest_skill:meta.suggest_skill||null,meta:meta.label||'',
    reasoning:meta.reasoning||'',
    error:!!meta.error,ts:m.created_at,pending:meta.pending||null,pending_resolved:meta.pending_resolved||null}; }
const ago=iso=>{ if(!iso)return''; const s=(Date.now()-new Date(iso).getTime())/1000;
  if(s<60)return'just now'; if(s<3600)return Math.floor(s/60)+'m ago';
  if(s<86400)return Math.floor(s/3600)+'h ago'; if(s<604800)return Math.floor(s/86400)+'d ago';
  return new Date(iso).toLocaleDateString(); };
// MSP AI runs on Eastern time — every displayed time is pinned to it, whatever the viewer's browser TZ (D-39).
const APP_TZ='America/New_York';
const fmtTS=iso=>{ if(!iso)return''; const d=new Date(iso); if(isNaN(d))return'';
  const now=new Date(), day=o=>o.toLocaleDateString('en-US',{timeZone:APP_TZ}),
    yr=o=>o.toLocaleDateString('en-US',{timeZone:APP_TZ,year:'numeric'});
  const t=d.toLocaleTimeString('en-US',{timeZone:APP_TZ,hour:'numeric',minute:'2-digit'});
  if(day(d)===day(now)) return t;
  return d.toLocaleDateString('en-US',{timeZone:APP_TZ,month:'short',day:'numeric',
    ...(yr(d)===yr(now)?{}:{year:'numeric'})})+' '+t; };
const fmtTSFull=iso=>{ if(!iso)return''; const d=new Date(iso); if(isNaN(d))return'';
  return d.toLocaleString('en-US',{timeZone:APP_TZ,year:'numeric',month:'short',day:'numeric',
    hour:'numeric',minute:'2-digit',second:'2-digit'}); };
// ── markdown rendering (safe, dependency-free subset: tables, bold/italic/code, headings, lists, links) ──
const _mdesc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const _mdsep=l=>/^\s*\|?\s*:?-{2,}:?\s*(\|\s*:?-{2,}:?\s*)*\|?\s*$/.test(l);
const _mdcells=l=>l.replace(/^\s*\|/,'').replace(/\|\s*$/,'').split('|').map(c=>c.trim());
function _mdinline(s){ return s
  .replace(/`([^`]+)`/g,'<code class="bg-white/10 rounded px-1 text-[12px]">$1</code>')
  .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
  .replace(/(^|[^*])\*([^*\s][^*]*)\*/g,'$1<em>$2</em>')
  .replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g,'<a href="$2" target="_blank" rel="noopener" class="text-accent underline">$1</a>'); }
function md(src){ const lines=_mdesc(src).split(/\r?\n/); let html='',i=0;
  while(i<lines.length){ const l=lines[i];
    if(l.includes('|')&&i+1<lines.length&&_mdsep(lines[i+1])){           // GitHub table
      const head=_mdcells(l); i+=2; const rows=[];
      while(i<lines.length&&lines[i].includes('|')&&lines[i].trim()){ rows.push(_mdcells(lines[i])); i++; }
      html+=`<div class="overflow-auto my-2 rounded-lg border border-edge"><table class="w-full text-xs">
        <thead class="bg-white/5"><tr>${head.map(h=>`<th class="text-left px-2.5 py-1.5 border-b border-edge font-semibold whitespace-nowrap">${_mdinline(h)}</th>`).join('')}</tr></thead>
        <tbody>${rows.map(r=>`<tr class="border-b border-edge/30">${r.map(c=>`<td class="px-2.5 py-1 align-top">${_mdinline(c)}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`; continue; }
    let m; if(m=l.match(/^(#{1,4})\s+(.*)$/)){ html+=`<div class="font-semibold mt-2 ${m[1].length<=2?'text-base':'text-sm'}">${_mdinline(m[2])}</div>`; i++; continue; }
    if(/^\s*[-*]\s+/.test(l)){ const it=[]; while(i<lines.length&&/^\s*[-*]\s+/.test(lines[i])){ it.push(_mdinline(lines[i].replace(/^\s*[-*]\s+/,''))); i++; } html+=`<ul class="list-disc ml-5 my-1 space-y-0.5">${it.map(x=>`<li>${x}</li>`).join('')}</ul>`; continue; }
    if(/^\s*\d+\.\s+/.test(l)){ const it=[]; while(i<lines.length&&/^\s*\d+\.\s+/.test(lines[i])){ it.push(_mdinline(lines[i].replace(/^\s*\d+\.\s+/,''))); i++; } html+=`<ol class="list-decimal ml-5 my-1 space-y-0.5">${it.map(x=>`<li>${x}</li>`).join('')}</ol>`; continue; }
    if(!l.trim()){ i++; continue; }
    html+=`<div>${_mdinline(l)}</div>`; i++; }
  return html; }
// ── extract markdown tables for export ──
function parseTables(text){ const lines=String(text??'').split(/\r?\n/),out=[]; let i=0;
  while(i<lines.length){ if(lines[i].includes('|')&&i+1<lines.length&&_mdsep(lines[i+1])){
      const headers=_mdcells(lines[i]); i+=2; const rows=[];
      while(i<lines.length&&lines[i].includes('|')&&lines[i].trim()){ rows.push(_mdcells(lines[i])); i++; }
      out.push({headers,rows}); } else i++; }
  return out; }
const hasTable=text=>parseTables(text).length>0;
function openTablePopup(text){
  const tables=parseTables(text); if(!tables.length){ toast('No table found in this message',false); return; }
  const w=window.open('','_blank'); if(!w){ toast('Popup blocked — allow popups for this site',false); return; }
  const e=_mdesc, body=tables.map((t,ti)=>`${tables.length>1?`<h2>Table ${ti+1}</h2>`:''}<table><thead><tr>${t.headers.map(h=>`<th>${e(h)}</th>`).join('')}</tr></thead><tbody>${t.rows.map(r=>`<tr>${r.map(c=>`<td>${e(c)}</td>`).join('')}</tr>`).join('')}</tbody></table>`).join('');
  w.document.write(`<!doctype html><html><head><meta charset="utf-8"><title>MSP AI — Table export</title><style>
    body{font-family:Inter,system-ui,sans-serif;background:#0b1220;color:#e2e8f0;margin:0;padding:24px}
    h2{font-size:13px;color:#94a3b8;margin:20px 0 6px}
    table{border-collapse:collapse;width:100%;font-size:13px;margin-bottom:10px}
    th,td{border:1px solid #1e293b;padding:6px 10px;text-align:left}
    thead th{background:#111c33} tr:nth-child(even) td{background:#0e1830}
    .bar{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
    button{background:#6366f1;color:#fff;border:0;border-radius:8px;padding:8px 14px;font-size:13px;cursor:pointer}
    button.sec{background:#1e293b;color:#cbd5e1}
    @media print{.bar{display:none}body{background:#fff;color:#000}th,td{border-color:#999}thead th{background:#eee}tr:nth-child(even) td{background:#f3f4f6}}
  </style></head><body>
    <div class="bar"><button onclick="dl('csv')">⬇ CSV</button><button onclick="dl('xls')">⬇ Excel</button>
      <button class="sec" onclick="window.print()">🖨 Print / Save PDF</button><button class="sec" onclick="cp()">⧉ Copy</button></div>
    ${body}
    <script>
      var T=${JSON.stringify(tables)};
      function cc(s){s=String(s==null?'':s);return /[",\\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s;}
      function toCSV(){return T.map(function(t){return [t.headers].concat(t.rows).map(function(r){return r.map(cc).join(',');}).join('\\n');}).join('\\n\\n');}
      function save(n,m,c){var b=new Blob([c],{type:m}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=n;a.click();}
      function dl(k){ if(k==='csv'){ save('export.csv','text/csv;charset=utf-8',toCSV()); }
        else { var h='<html xmlns:x="urn:schemas-microsoft-com:office:excel"><head><meta charset=utf-8></head><body>';
          document.querySelectorAll('table').forEach(function(t){h+=t.outerHTML+'<br>';}); h+='</body></html>';
          save('export.xls','application/vnd.ms-excel',h); } }
      function cp(){ navigator.clipboard.writeText(toCSV()).then(function(){alert('Copied (CSV) to clipboard');}); }
    <\/script></body></html>`);
  w.document.close();
}
function prettyJson(s){ if(s==null)return''; try{ return JSON.stringify(JSON.parse(s),null,2); }catch(_){ return String(s); } }
// Offer to save a multi-step turn as a reusable learned skill (Phase 4). Dedups server-side (409).
async function saveSkill(s){
  const name=prompt('Save this as a reusable skill.\n\nName it:', s.proposed_name||'');
  if(name===null||!name.trim()) return;
  const desc=prompt('One-line description — when should this skill be used?', s.summary||'');
  if(desc===null) return;
  const payload={name:name.trim(),description:desc.trim(),tools:s.tools||[],
                 steps:'Tools used, in order: '+(s.tools||[]).join(' → ')};
  let r=await api('POST','/api/skills/learn',payload);
  if(r&&r.ok){ toast('Skill saved — see the Skills tab'); return; }
  if(r&&r.duplicate){
    if(confirm(`A similar skill already exists: "${r.duplicate.name}".\n\nOverwrite it?`)){
      r=await api('POST','/api/skills/learn',{...payload,force:true});
      if(r&&r.ok){ toast('Skill updated'); return; }
    } else { toast('Kept the existing skill'); return; }
  }
  toast((r&&r.error&&r.error.includes('admin'))?'Owner only — admin can save skills'
        :('Save failed: '+((r&&r.error)||'')),false);
}

// Download a KB doc as a .md file (client-side blob).
async function downloadKbDoc(doc){
  const r=await api('GET','/api/kb?doc='+encodeURIComponent(doc));
  if(!r||r.content==null){ toast('Could not load doc',false); return; }
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([r.content],{type:'text/markdown'}));
  a.download=doc.split('/').pop()||'doc.md'; document.body.appendChild(a); a.click();
  a.remove(); URL.revokeObjectURL(a.href);

// Rename / move one of the owner's kb/ docs (bundled reference docs can't be renamed).
async function renameKbDoc(doc){
  const cur=doc.replace(/^kb\//,'');
  const to=prompt('New filename (under kb/, subfolders ok — e.g. runbooks/onboarding.md):',cur);
  if(to===null) return;

// Approve/Reject from inside the chat (D-47): decide, then the server posts the result back as a
// new assistant message which we append here — so the outcome shows up with no nudge.
async function decideInline(btn,kind,batch){
  const id=btn.dataset.a, card=btn.closest('.ap-inline');
  if(card) card.querySelectorAll('button').forEach(b=>b.disabled=true);
  if(kind==='approve') btn.innerHTML='<i data-lucide="loader-circle" class="text-[12px] animate-spin"></i> Running…';
  icons();
  let r; try{ r=await api('POST','/api/approvals/'+id+'/'+kind,{conversation_id:CONV,batch:!!batch}); }catch(_){ r=null; }
  if(!r||!r.ok){ toast((r&&r.error)||'failed',false);
    if(card) card.querySelectorAll('button').forEach(b=>b.disabled=false);
    return; }
  if(card) card.outerHTML=`<div class="mt-2 text-[11px] ${kind==='reject'?'text-rose-400':'text-emerald-400'} inline-flex items-center gap-1"><i data-lucide="${kind==='reject'?'x-circle':'check-circle-2'}" class="text-[12px]"></i> ${kind==='reject'?'Rejected':'Approved & ran'}</div>`;
  if(r.message){ const turn={role:'assistant',answer:r.message,ts:new Date().toISOString()};
    MSGS.push(turn); bubble('ai',aiHtml(turn),null,turn.ts); }
  // D-62: the agent's continuation turn (it picks the task back up after the approval)
  if(r.continuation&&r.continuation.message){
    const ct={role:'assistant',answer:r.continuation.message,pending:r.continuation.pending||null,
              meta:r.continuation.label||'',ts:new Date().toISOString()};
    MSGS.push(ct); bubble('ai',aiHtml(ct),null,ct.ts); }
  refreshApprovalBadge(); icons();
}

    `<details class="mt-1"><summary class="cursor-pointer text-[11px] text-slate-400 hover:text-slate-200 select-none inline-flex items-center gap-1"><i data-lucide="braces" class="text-[11px]"></i>${esc(x.name)} — returned data</summary><pre class="text-[11px] text-slate-300 bg-ink/60 border border-edge rounded-lg p-2 mt-1 overflow-auto max-h-72 whitespace-pre-wrap">${esc(prettyJson(x.data))}</pre></details>`).join('');

  if(t.meta) h+=`<div class="text-[11px] text-slate-600 mt-1">${esc(t.meta)}</div>`;
  return h; }

async function loadHostStats(){ const el=$('#hoststats'); if(!el) return;
  let s; try{ s=await api('GET','/api/system/stats'); }catch(_){ return; }
  if($('#hostname')) $('#hostname').textContent=s.host||'';
  const bar=(label,pct,sub)=>{ const p=(pct==null||isNaN(pct))?null:Math.max(0,Math.min(100,pct));
    const col=p==null?'#475569':p>85?'#f43f5e':p>60?'#fb923c':'#10b981';
    return `<div class="mb-2"><div class="flex justify-between text-xs mb-1"><span class="text-slate-300">${label}</span><span class="text-slate-400">${p==null?'n/a':p+'%'}${sub?` · ${esc(sub)}`:''}</span></div>
      <div class="h-2 rounded-full bg-edge/60 overflow-hidden"><div class="h-full rounded-full transition-all" style="width:${p==null?0:p}%;background:${col}"></div></div></div>`; };
  let h=bar(`CPU${s.cpu&&s.cpu.cores?` · ${s.cpu.cores} cores`:''}`, s.cpu&&s.cpu.percent, s.cpu&&s.cpu.load?`load ${s.cpu.load[0].toFixed(2)}`:'');
  if(s.memory) h+=bar('Memory', s.memory.percent, `${s.memory.used_gb}/${s.memory.total_gb} GB`);
  if(s.disk) h+=bar('Disk', s.disk.percent, `${s.disk.used_gb}/${s.disk.total_gb} GB`);
  if(s.gpu&&s.gpu.length) s.gpu.forEach((g,i)=>{ const vram=g.mem_total_mb?100*g.mem_used_mb/g.mem_total_mb:null;
    h+=bar(`GPU${s.gpu.length>1?` ${i}`:''}${g.name?` · ${esc(g.name)}`:''}`, g.util_percent,
      [g.temp_c!=null?`${g.temp_c}°C`:'', vram!=null?`${Math.round(vram)}% vram`:''].filter(Boolean).join(' · ')); });
  else h+=`<div class="text-[11px] text-slate-500 self-center">No NVIDIA GPU detected (or nvidia-smi unavailable).</div>`;
  el.innerHTML=h; }

async function renderClientCreds(){
  const el=$('#memCreds'); if(!el)return;
  const s=await api('GET','/api/credvault').catch(()=>({})); window._cvStatus=s;
  const note=(icon,color,text)=>`<div class="flex-1 grid place-items-center text-center"><div class="max-w-sm"><i data-lucide="${icon}" class="${color}" style="font-size:2rem"></i><div class="text-slate-400 text-sm mt-3">${text}</div></div></div>`;
  if(!s.initialized){ el.innerHTML=note('shield-plus','text-accent','Set up the credential vault first — click the lock icon in the top bar and choose your passphrase.'); icons(); return; }
  if(!s.unlocked){ el.innerHTML=note('lock','text-amber-400','The credential vault is locked. Click the lock icon in the top bar and enter your passphrase.'); icons(); return; }
  let list=[]; try{ list=(await api('GET','/api/clients/'+encodeURIComponent(TENANT)+'/credentials')).credentials||[]; }catch(_){}
  const apBadge=n=>n.start||n.end?`<span class="pill bg-amber-500/15 text-amber-300 text-[10px]">${n.start&&n.end?'start+end append':n.start?'start append':'end append'}</span>`:'';
  const row=c=>`<div class="flex items-center gap-3 py-2.5 border-b border-edge/40">
    <i data-lucide="key-round" class="text-slate-500 shrink-0"></i>
    <div class="min-w-0 flex-1"><div class="flex items-center gap-2 flex-wrap"><span class="font-mono text-[13px] text-slate-200">${esc(c.label)}</span>${apBadge(c.needs_append)}</div>
      <div class="text-[11px] text-slate-500 font-mono truncate">${Object.entries(c.fingerprints).map(([k,v])=>esc(k)+':'+esc(v)).join('  ')}</div>${c.notes?`<div class="text-[11px] text-slate-500">${esc(c.notes)}</div>`:''}</div>
    <button class="cvTest hbtn shrink-0" style="height:30px;padding:0 10px;font-size:11px" data-l="${esc(c.label)}" data-need='${esc(JSON.stringify(c.needs_append))}'>Test</button>
    <button class="cvEdit hbtn shrink-0" style="width:30px;height:30px;padding:0" data-l="${esc(c.label)}" title="Edit"><i data-lucide="pencil" class="text-[12px]"></i></button>
    <button class="cvDel hbtn shrink-0" style="width:30px;height:30px;padding:0;color:#fda4af" data-l="${esc(c.label)}" title="Delete"><i data-lucide="trash-2" class="text-[12px]"></i></button></div>`;
  el.innerHTML=`<div class="flex items-center gap-2 mb-1">
      <span class="text-[11px] text-slate-500">Encrypted at rest — the AI sees only labels, never values.</span>
      <button id="cvAdd" class="ml-auto grad text-white rounded-lg px-3 py-1.5 text-xs font-semibold inline-flex items-center gap-1.5"><i data-lucide="plus"></i> Add credential</button></div>
    <div class="flex-1 overflow-auto -mr-2 pr-2">${list.length?list.map(row).join(''):'<div class="text-sm text-slate-500 py-3">No credentials for this client yet.</div>'}</div>
    <div class="text-[11px] text-slate-600 mt-2 flex items-start gap-1.5"><i data-lucide="info" class="text-[12px] mt-0.5 shrink-0"></i>Tip: put <span class="font-mono text-slate-400">{end_append}</span> or <span class="font-mono text-slate-400">{start_append}</span> in a password to require a human to type that piece each time it's used — it's never stored.</div>`;
  icons();
  if($('#cvAdd'))$('#cvAdd').onclick=()=>cvEditor(null);
  el.querySelectorAll('.cvEdit').forEach(b=>b.onclick=()=>{ const c=list.find(x=>x.label===b.dataset.l); cvEditor(c); });
  el.querySelectorAll('.cvDel').forEach(b=>b.onclick=async()=>{ if(!confirm('Delete credential "'+b.dataset.l+'"?'))return;
    const r=await api('DELETE','/api/clients/'+encodeURIComponent(TENANT)+'/credentials/'+encodeURIComponent(b.dataset.l));
    if(r&&r.ok){ toast('Deleted'); renderClientCreds(); } else toast((r&&r.error)||'failed',false); });
  el.querySelectorAll('.cvTest').forEach(b=>b.onclick=async()=>{ const need=JSON.parse(b.dataset.need);
    const body={}; if(need.start){ const v=prompt('Start append for "'+b.dataset.l+'":'); if(v===null)return; body.start=v; }
    if(need.end){ const v=prompt('End append for "'+b.dataset.l+'":'); if(v===null)return; body.end=v; }
    const r=await api('POST','/api/clients/'+encodeURIComponent(TENANT)+'/credentials/'+encodeURIComponent(b.dataset.l)+'/test',body);
    if(r&&r.ok) toast(`✓ Assembled a ${r.password_len}-char secret (fp ${r.password_fp}) — value never shown`);
    else if(r&&r.append_required) toast('Append still required',false);
    else toast((r&&r.error)||'failed',false); });
}
function cvEditor(existing){ const isEdit=!!existing;
  openDrawer({title:isEdit?'Edit credential':'New credential',icon:'key-round',render:body=>{
    const f=(existing&&existing.field_names)||['username','password'];
    body.innerHTML=`<div class="p-4 space-y-3">
      <div><label class="block text-[11px] uppercase tracking-wide text-slate-500 mb-1">Label</label>
        <input id="cvL" class="w-full bg-ink/70 border border-edge rounded-lg px-3 py-2 text-sm font-mono ${isEdit?'opacity-60':''}" value="${esc(existing?existing.label:'')}" placeholder="o365_global_admin" ${isEdit?'readonly':''}></div>
      <div id="cvFields" class="space-y-2"></div>
      <button id="cvAddField" class="text-[11px] text-accent hover:underline">+ add field</button>
      <div><label class="block text-[11px] uppercase tracking-wide text-slate-500 mb-1">Notes (optional)</label>
        <input id="cvN" class="w-full bg-ink/70 border border-edge rounded-lg px-3 py-2 text-sm" value="${esc(existing?existing.notes||'':'')}"></div>
      <div class="text-[11px] text-slate-500 flex items-start gap-1.5"><i data-lucide="lightbulb" class="text-[12px] mt-0.5 shrink-0"></i>Add <span class="font-mono text-slate-400">{end_append}</span>/<span class="font-mono text-slate-400">{start_append}</span> inside a password value to require a human to complete it at use-time.${isEdit?' Leave a field blank to keep its current value unchanged.':''}</div>
      <button id="cvSave" class="grad text-white rounded-lg w-full py-2.5 text-sm font-semibold">${isEdit?'Save changes':'Save credential'}</button></div>`;
    icons();
    const fieldsEl=$('#cvFields');
    const addField=(k='',isPw=false)=>{ const d=document.createElement('div'); d.className='flex gap-2 items-center cvFieldRow';
      d.innerHTML=`<input class="cvFk w-36 bg-ink/70 border border-edge rounded-lg px-2.5 py-2 text-xs font-mono" placeholder="field" value="${esc(k)}">
        <input class="cvFv flex-1 bg-ink/70 border border-edge rounded-lg px-2.5 py-2 text-sm" type="${isPw?'text':'text'}" placeholder="${isEdit?'(unchanged)':'value'}">
        <button class="cvFx text-slate-500 hover:text-rose-300" title="remove">&times;</button>`;
      d.querySelector('.cvFx').onclick=()=>d.remove(); fieldsEl.appendChild(d); };
    (f.length?f:['username','password']).forEach(k=>addField(k,k==='password'));
    $('#cvAddField').onclick=()=>addField('');
    $('#cvSave').onclick=async()=>{ const label=$('#cvL').value.trim();
      const fields={}; fieldsEl.querySelectorAll('.cvFieldRow').forEach(r=>{ const k=r.querySelector('.cvFk').value.trim(); const v=r.querySelector('.cvFv').value;
        if(k&&v!=='') fields[k]=v; });
      if(!label){ toast('label required',false); return; }
      if(!isEdit&&!Object.keys(fields).length){ toast('add at least one field value',false); return; }
      // on edit, merge unchanged fields by re-sending only the ones the user filled (server overwrites whole entry,
      // so we must include prior field NAMES with their kept values — but we don't have values; so require re-entry
      // is avoided by sending only changed fields and letting server keep label). Simplify: edit overwrites with what's provided.
      const r=await api('POST','/api/clients/'+encodeURIComponent(TENANT)+'/credentials',{label,fields,notes:$('#cvN').value});
      if(r&&r.ok){ toast('Saved (encrypted)'); closeDrawer(); renderClientCreds(); }
      else toast((r&&r.error)||'failed',false); };
  }});
}
// ── restart the MSP AI service (admin Terminal button, D-36) ──
// Restarting kills the process serving this page, so: fire the (detached) restart, then show an
// overlay that polls a public endpoint until the new process answers, and reload.
async function restartService(){
  if(!confirm('Restart the MSP AI service?\n\nThe dashboard will disconnect for a few seconds and reload automatically once it is back.'))return;
  let ov=document.getElementById('restartOverlay');
  if(!ov){ ov=document.createElement('div'); ov.id='restartOverlay';
    ov.style.cssText='position:fixed;inset:0;z-index:9999;background:rgba(8,11,19,.92);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center';
    document.body.appendChild(ov); }
  ov.innerHTML=`<div class="card p-6 text-center max-w-sm">
    <i data-lucide="rotate-ccw" class="text-accent animate-spin" style="font-size:1.8rem"></i>
    <div class="font-semibold mt-3">Restarting MSP AI…</div>
    <div id="restartMsg" class="text-xs text-slate-400 mt-1.5">sending restart command…</div></div>`;
  if(window.lucide)lucide.createIcons();
  const msg=t=>{const m=document.getElementById('restartMsg');if(m)m.textContent=t;};
  try{ await api('POST','/api/system/restart'); }catch(_){}   // connection may drop mid-request — expected
  msg('waiting for the service to come back…');
  const t0=Date.now();
  const tick=async()=>{
    try{
      const r=await fetch('/api/branding',{cache:'no-store'});
      if(r.ok){ msg('back online — reloading…'); setTimeout(()=>location.reload(),600); return; }
    }catch(_){}
    if(Date.now()-t0>90000){ msg('still waiting… check the Recovery console on :8091 if this persists.'); }
    setTimeout(tick,2000);
  };
  setTimeout(tick,4000);   // give systemd a moment to stop the old process before polling
}

// Make xterm copy/paste behave like a real terminal: select auto-copies, plus Ctrl+Shift+C/V,
// right-click, and Shift/Ctrl+Insert. Falls back to execCommand so it works on plain-HTTP (the
// :8091 recovery console), where the secure-context Clipboard API is unavailable. (Mirror of the
// inline version in execution/web/recovery.py — keep both in sync.)
function wireTermClipboard(term,ws,host,hint){
  const secure=window.isSecureContext&&navigator.clipboard;
  const flash=t=>{try{hint&&hint(t)}catch(e){}};
  const execCopy=text=>{const ta=document.createElement('textarea');ta.value=text;
    ta.style.position='fixed';ta.style.top='-9999px';document.body.appendChild(ta);ta.select();
    try{document.execCommand('copy')}catch(e){}document.body.removeChild(ta);try{term.focus()}catch(e){}};
  const writeClip=text=>{if(!text)return;
    if(secure)navigator.clipboard.writeText(text).then(()=>{},()=>execCopy(text));else execCopy(text);};
  const copySel=()=>{const s=term.getSelection();if(s){writeClip(s);flash('copied');return true;}return false;};
  const pasteClip=()=>{if(!secure)return false;
    navigator.clipboard.readText().then(t=>{if(t){term.paste(t);flash('pasted');}}).catch(()=>{});return true;};
  host.addEventListener('mousedown',e=>{if(e.button===0)setTimeout(()=>{try{term.focus()}catch(_){}}, 0);});
  host.addEventListener('mouseup',()=>{const s=term.getSelection();if(s){writeClip(s);flash('copied');}});
  host.addEventListener('paste',()=>flash('pasted'));            // native Ctrl+V path
  host.addEventListener('auxclick',e=>{if(e.button===1&&pasteClip())e.preventDefault();});
  host.addEventListener('contextmenu',e=>{                       // right-click paste (secure);
    if(secure){e.preventDefault();pasteClip();}});               // else native menu's Paste still works
  term.attachCustomKeyEventHandler(e=>{
    if(e.type!=='keydown')return true;
    if(e.ctrlKey&&e.shiftKey&&e.code==='KeyC')return copySel()?false:true;
    if(e.ctrlKey&&e.shiftKey&&e.code==='KeyV')return pasteClip()?false:true;
    if(e.ctrlKey&&e.code==='Insert')return copySel()?false:true;
    if(e.shiftKey&&e.code==='Insert')return pasteClip()?false:true;
    return true;});
}

    // ── slash commands (client-side) — typing "/" opens a command palette ──
    const SLASH=[
      {cmd:'new',      desc:'Start a fresh conversation',                 run:()=>newChat()},
      {cmd:'history',  desc:'Browse & search past conversations',         run:()=>openHistory()},
      {cmd:'activity', desc:'Recent logged actions',                      run:()=>openActivity()},
      {cmd:'compact',  desc:'Summarise older turns to shrink context',    run:()=>$('#compactChat')&&$('#compactChat').click()},
      {cmd:'delete',   desc:'Delete this conversation',                   run:()=>$('#delChat')&&$('#delChat').click()},
    ];
    // ── auto-grow composer + slash palette + Enter-to-send ──
    const ta=$('#msg');
    const grow=()=>{ ta.style.height='auto'; ta.style.height=Math.min(ta.scrollHeight,160)+'px'; };
    let slashList=[], slashSel=0;
    const closeSlash=()=>{ const s=$('#slash'); if(s){ s.classList.add('hidden'); s.innerHTML=''; } slashList=[]; slashSel=0; };
    const renderSlash=()=>{ const s=$('#slash'); if(!s)return; const m=/^\/(\w*)$/.exec(ta.value);
      if(!m){ closeSlash(); return; } const q=m[1].toLowerCase();
      slashList=SLASH.filter(c=>c.cmd.startsWith(q)); if(!slashList.length){ closeSlash(); return; }
      if(slashSel>=slashList.length) slashSel=0;
      s.innerHTML='<div class="slash-head">Commands</div>'+slashList.map((c,i)=>`<div class="slash-item ${i===slashSel?'sel':''}" data-i="${i}"><span class="slash-cmd">/${esc(c.cmd)}</span><span class="slash-desc">${esc(c.desc)}</span></div>`).join('');
      s.classList.remove('hidden');
      s.querySelectorAll('.slash-item').forEach(it=>{ it.onmousedown=e=>{ e.preventDefault(); runSlash(+it.dataset.i); }; it.onmouseenter=()=>{ slashSel=+it.dataset.i; renderSlash(); }; }); };
    const runSlash=i=>{ const c=slashList[i]; closeSlash(); ta.value=''; grow(); if(c)c.run(); };
    if(ta){
      ta.addEventListener('input',()=>{ grow(); renderSlash(); });
      ta.addEventListener('keydown',e=>{
        if(slashList.length){
          if(e.key==='ArrowDown'){ e.preventDefault(); slashSel=(slashSel+1)%slashList.length; renderSlash(); return; }
          if(e.key==='ArrowUp'){ e.preventDefault(); slashSel=(slashSel-1+slashList.length)%slashList.length; renderSlash(); return; }
          if(e.key==='Enter'||e.key==='Tab'){ e.preventDefault(); runSlash(slashSel); return; }
          if(e.key==='Escape'){ e.preventDefault(); closeSlash(); return; }
        }
        if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); $('#chatForm').requestSubmit(); }
      });
      ta.addEventListener('blur',()=>setTimeout(closeSlash,150));
    }
    if($('#histBtn'))$('#histBtn').onclick=openHistory;
    if($('#actBtn'))$('#actBtn').onclick=openActivity;
    if($('#addModel'))$('#addModel').onclick=()=>route('integrations');
    if($('#newChatTop'))$('#newChatTop').onclick=newChat;
    if($('#delChat'))$('#delChat').onclick=()=>{ if(!CONV){ toast('No saved conversation to delete yet',false); return; } delConv(CONV); };
    $('#compactChat').onclick=async()=>{ if(!CONV||MSGS.length<4){ toast('Not enough conversation to compact yet',false); return; }
      toast('Compacting…');
      let r; try{ r=await api('POST','/api/conversations/'+CONV+'/compact',{model:MODEL}); }catch(_){ toast('compact failed',false); return; }
      if(!r||!r.messages){ toast('compact failed',false); return; }
      MSGS=r.messages.map(normMsg); renderChatLog(); showSuggest(); updateMeter(); toast('Conversation compacted'); };
    $('#msgs').addEventListener('click',e=>{ const b=e.target.closest('.open-table'); if(b){ openTablePopup(decodeURIComponent(b.dataset.answer)); return; }
      const sk=e.target.closest('.save-skill'); if(sk){ saveSkill(JSON.parse(decodeURIComponent(sk.dataset.sk))); return; }
      const th=e.target.closest('.think-toggle');
      if(th&&STREAM&&!STREAM.done){ const cur=STREAM.thinkTouched?!!STREAM.thinkOpen:!STREAM.acc;
        STREAM.thinkTouched=true; STREAM.thinkOpen=!cur; paintStream(); return; }
      const ap=e.target.closest('.ap-in-approve'), rj=e.target.closest('.ap-in-reject'),
            bt=e.target.closest('.ap-in-batch');
      if(ap) decideInline(ap,'approve'); else if(bt) decideInline(bt,'approve',true);
      else if(rj) decideInline(rj,'reject'); });
    $('#chatForm').onsubmit=async e=>{e.preventDefault();
      if(STREAM&&!STREAM.done){ toast('Hit Stop to interrupt the current reply first',false); return; }
      const m=$('#msg').value.trim();if(!m)return;$('#msg').value='';$('#msg').style.height='auto';
      const sentAt=new Date().toISOString();    // optimistic; server's created_at wins on reload
      MSGS.push({role:'user',text:m,ts:sentAt}); showSuggest(); updateMeter();
      bubble('you',esc(m),null,sentAt);
      // State at module scope (STREAM) so a tab switch can't kill the turn; the reader keeps
      // painting into the stable #ai-streaming bubble wherever it currently lives.
      STREAM={conv:CONV, acc:'', think:'', tools:[], done:false, turn:null, stopping:false};
      bubble('ai',CHAT_DOTS,'ai-streaming');
      streamUI(true);
      try{
        const resp=await fetch('/api/chat/stream',{method:'POST',credentials:'same-origin',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({conversation_id:CONV,tenant:TENANT,message:m,model:MODEL||undefined,
            agent:CHAT_AGENT?CHAT_AGENT.id:undefined})});
        if(resp.status===401){ showLogin(); throw new Error('auth'); }
        if(!resp.body) throw new Error('no stream');
        const reader=resp.body.getReader(), dec=new TextDecoder(); let buf='';
        while(true){ const {value,done}=await reader.read(); if(done)break;
          buf+=dec.decode(value,{stream:true}); let i;
          while((i=buf.indexOf('\n\n'))>=0){ const line=buf.slice(0,i).replace(/^data: ?/,''); buf=buf.slice(i+2);
            if(!line)continue; let ev; try{ev=JSON.parse(line);}catch(_){continue;}
            if(ev.type==='start'){ CONV=ev.conversation_id||CONV; STREAM.conv=CONV; }
            else if(ev.type==='client_locked'){ if(ev.tenant&&TENANT==='*'){ TENANT=ev.tenant;
              const l=$('#cliLabel'); if(l)l.textContent=tenantLabel(TENANT);
              const c=CONVS.find(x=>x.id===CONV); if(c)c.tenant_id=ev.tenant; toast(`Locked to ${ev.tenant} for this chat`); } }
            else if(ev.type==='thinking'){ STREAM.think+=ev.text; paintStream(); }
            else if(ev.type==='delta'){ STREAM.acc+=ev.text; paintStream(); }
            else if(ev.type==='tool_call'){ STREAM.tools.push({name:ev.name,ok:null}); paintStream(); }
            else if(ev.type==='tool_result'){ const t=STREAM.tools.find(x=>x.name===ev.name&&x.ok===null); if(t)t.ok=ev.ok; else STREAM.tools.push({name:ev.name,ok:ev.ok}); paintStream(); }
            else if(ev.type==='answer'){ STREAM.turn={role:'assistant',answer:ev.answer||STREAM.acc,tools:ev.tool_events||[],citations:ev.citations||[],suggest_skill:ev.suggest_skill||null,pending:ev.pending||null,reasoning:ev.reasoning||STREAM.think||'',meta:`${ev.provider}/${ev.model} · ${ev.rounds} round(s)`};
              // D-52: the turn locked this all-clients chat onto one client — follow it in the
              // picker + rebind the conversation locally so switching client later starts a new chat.
              if(ev.focus_client&&TENANT==='*'){ TENANT=ev.focus_client;
                const l=$('#cliLabel'); if(l)l.textContent=tenantLabel(TENANT);
                const c=CONVS.find(x=>x.id===CONV); if(c)c.tenant_id=ev.focus_client;
                toast(`Locked to ${ev.focus_client} for this chat`); } }
            else if(ev.type==='error'){ throw new Error(ev.error||'stream error'); }
          }
        }
        const turn=STREAM.turn||{role:'assistant',answer:STREAM.acc,reasoning:STREAM.think||'',tools:STREAM.tools.map(t=>({name:t.name,ok:t.ok}))};
        turn.ts=new Date().toISOString();
        STREAM.done=true; MSGS.push(turn);
        const tEl=document.getElementById('ai-streaming-ts');
        if(tEl){ tEl.textContent=' · '+fmtTS(turn.ts); tEl.removeAttribute('id'); }
        const e=document.getElementById('ai-streaming'); if(e){ e.removeAttribute('id'); e.innerHTML=aiHtml(turn); icons(); }
        STREAM=null; streamUI(false); updateMeter(); refreshConvs();   // server persisted it; refresh titles/order
        // A write proposed during this turn may now sit in Approvals — surface it immediately
        // (the 45s poll is too slow to notice mid-conversation).
        const prevAp=window._apPending||0;
        refreshApprovalBadge().then(n=>{ if(n>prevAp) toast(`${n} write action${n>1?'s':''} waiting for your approval — bell, top right`,true); });
      }catch(err){ if(STREAM)STREAM.done=true;
        if(!(err&&err.message==='auth')){ MSGS.push({role:'assistant',error:true});
          const e=document.getElementById('ai-streaming'); if(e){ e.removeAttribute('id'); e.innerHTML='<span class="text-rose-400">error</span>'; } }
        STREAM=null; streamUI(false); }};
    const sb=$('#stopBtn'); if(sb) sb.onclick=stopStream;
    renderRail(); await loadMsgs(); renderChatLog(); showSuggest(); updateMeter(); icons();
    reattachStream();   // if a turn is still streaming, re-show it continuing
  },

    const fmtNext=ms=>{ if(!ms)return''; const d=ms-Date.now(); if(d<=0)return'due now'; const m=Math.round(d/60000); if(m<60)return`in ${m}m`; const h=Math.round(m/60); if(h<24)return`in ${h}h`; return`in ${Math.round(h/24)}d`; };
    const card=t=>`<div class="card card-hover p-3 cursor-pointer board-card" data-id="${esc(t.id)}">
        <div class="text-sm font-medium leading-snug mb-1.5">${esc(t.title)}</div>

    const empty=`<div class="card glass p-10 max-w-xl mx-auto text-center mt-6">
        <div class="h-12 w-12 rounded-2xl grad grid place-items-center mx-auto mb-3 shadow-lg shadow-indigo-500/30"><i data-lucide="layout-grid" class="text-white text-xl"></i></div>

  async terminal(){

    $('#view').innerHTML=`<div class="h-full flex flex-col min-h-0">
        <div class="flex items-center gap-2 mb-2 flex-wrap">
          <span class="pill bg-amber-500/15 text-amber-300 inline-flex items-center gap-1"><i data-lucide="triangle-alert" class="text-[12px]"></i> Admin · audited</span>

          <span id="termHint" class="text-[11px] text-emerald-300 inline-flex items-center gap-1 opacity-0 transition-opacity"><i data-lucide="clipboard-check" class="text-[12px]"></i><span></span></span>
          <span class="text-[11px] text-slate-500 ml-auto hidden md:inline">Select text to copy · <span class="font-mono text-slate-300">Ctrl+V</span> or right-click to paste · <span class="font-mono text-slate-300">Ctrl+Shift+C/V</span> also work</span>
          <button id="termRestart" class="hbtn" style="color:#fbbf24" title="Restart the MSP AI service (sudo systemctl restart msp-ai)"><i data-lucide="rotate-ccw" class="text-[13px]"></i> Restart MSP AI</button>
          <a id="termRecovery" target="_blank" rel="noopener" class="hbtn" title="Independent root console on :8091 — works even if the main app is down"><i data-lucide="life-buoy" class="text-[13px]"></i> Recovery console</a>
        </div>
        <div id="termHost" class="flex-1 min-h-0 rounded-xl border border-edge overflow-hidden" style="background:#0b0b10;padding:10px 0 0 14px"></div></div>`;
    icons();
    $('#termRecovery').href='http://'+location.hostname+':8091/';   // same host, recovery port
    $('#termRestart').onclick=()=>restartService();
    if(typeof Terminal==='undefined'){$('#termHost').innerHTML='<div class="p-4 text-sm text-rose-300">xterm.js failed to load (/vendor/xterm.js) — hard-refresh.</div>';return;}
    const host=$('#termHost');
    const stat=(c,t)=>{const e=$('#termStat');if(e)e.innerHTML=`<span class="h-2 w-2 rounded-full" style="background:${c}"></span>${t}`;};
    const term=new Terminal({fontFamily:'ui-monospace,SFMono-Regular,Menlo,monospace',fontSize:13,cursorBlink:true,allowProposedApi:true,
      theme:{background:'#0b0b10',foreground:'#e6e7ea',cursor:'#8b5cf6',selectionBackground:'#8b5cf640'}});
    const fit=new FitAddon.FitAddon();
    term.loadAddon(fit);term.open(host);setTimeout(()=>{try{fit.fit()}catch(e){}},0);
    const proto=location.protocol==='https:'?'wss':'ws';
    const ws=new WebSocket(proto+'://'+location.host+'/ws/terminal');
    const sendResize=()=>{try{fit.fit()}catch(e){}if(ws.readyState===1)ws.send(JSON.stringify({type:'resize',cols:term.cols,rows:term.rows}));};
    ws.onopen=()=>{stat('#10b981','connected · live shell');sendResize();term.focus();};
    ws.onmessage=e=>{const m=JSON.parse(e.data);if(m.type==='out')term.write(m.data);else if(m.type==='exit'){term.write('\r\n\x1b[90m[session ended]\x1b[0m\r\n');stat('#ef4444','session ended');}};
    ws.onclose=()=>stat('#ef4444','disconnected (admin only · or MSPAI_ADMIN_TERMINAL=0)');
    ws.onerror=()=>stat('#ef4444','connection error');
    term.onData(d=>{if(ws.readyState===1)ws.send(JSON.stringify({type:'in',data:d}));});
    let hintT=null;const hint=t=>{const h=$('#termHint');if(!h)return;h.querySelector('span').textContent=t;
      h.style.opacity='1';clearTimeout(hintT);hintT=setTimeout(()=>{h.style.opacity='0';},1100);};
    wireTermClipboard(term,ws,host,hint);
    const ro=new ResizeObserver(()=>sendResize());ro.observe(host);
    if(TERM_CLEANUP)try{TERM_CLEANUP()}catch(e){}
    TERM_CLEANUP=()=>{try{ro.disconnect()}catch(e){}try{ws.close()}catch(e){}try{term.dispose()}catch(e){}};
  },

              <select id="mfa-trust" class="bg-ink/80 border border-edge rounded-lg px-2 py-1 text-xs text-slate-200">

              <span class="text-slate-600">— the authenticator code is always required the first time on a new device.</span></div>
            <div class="grid sm:grid-cols-3 gap-2 max-w-xl"><input id="mfa-off-code" inputmode="numeric" maxlength="7" placeholder="current 6-digit code" class="bg-ink/80 border border-edge rounded-lg px-3 py-2 text-sm tracking-widest"/><button id="mfa-off" class="rounded-lg px-3 py-2 text-sm font-semibold inline-flex items-center justify-center gap-1" style="background:rgba(244,63,94,.15);color:#fda4af"><i data-lucide="shield-x"></i> Turn off</button></div>`

      document.querySelectorAll('.uedit').forEach(b=>b.onclick=()=>editUser(b.dataset.u,b.dataset.role,b.dataset.email));
      document.querySelectorAll('.umfa').forEach(b=>b.onclick=async()=>{if(!confirm('Reset (turn off) two-factor for '+b.dataset.u+'? They can sign in with just their password and re-enable it.'))return;
        const r=await api('POST','/api/users/'+encodeURIComponent(b.dataset.u)+'/mfa-reset',{});r.ok?(toast('MFA reset for '+b.dataset.u),route('settings')):toast(esc(r.error),false);});
    }
    icons();
  },

  async build(){
    if(!ME||ME.role!=='admin'){$('#view').innerHTML=`<div class="card p-5 max-w-2xl text-sm text-slate-400">The Build studio is admin-only.</div>`;return;}
    const {candidates}=await api('GET','/api/build/candidates');
    const cand=c=>`<div class="card p-4">
      <div class="flex items-center gap-2"><i data-lucide="file-code-2" class="text-accent"></i><span class="font-medium">${esc(c.name)}</span>
        ${c.validation.ok?`<span class="pill bg-emerald-500/15 text-emerald-300">validated</span>`:`<span class="pill bg-rose-500/15 text-rose-300">${c.validation.issues.length} issue(s)</span>`}
        <span class="ml-auto text-[11px] text-slate-600">${esc((c.created||'').slice(0,19).replace('T',' '))}</span></div>
      ${c.validation.ok?'':`<ul class="text-xs text-rose-300 mt-2 list-disc pl-5">${c.validation.issues.map(i=>`<li>${esc(i)}</li>`).join('')}</ul>`}
      <pre class="text-[11px] text-slate-300 bg-ink/60 border border-edge rounded-lg p-3 mt-2 overflow-auto max-h-72 font-mono whitespace-pre">${esc(c.code)}</pre>
      <div class="flex gap-2 mt-3">
        ${c.validation.ok?`<button class="bp-promote grad text-white rounded-lg px-3 py-1.5 text-xs font-semibold inline-flex items-center gap-1" data-n="${esc(c.name)}"><i data-lucide="rocket"></i> Promote to live (starts disabled)</button>`:''}
        <button class="bp-reject bg-rose-500/10 hover:bg-rose-500/20 text-rose-300 border border-rose-500/20 rounded-lg px-3 py-1.5 text-xs" data-n="${esc(c.name)}">Discard</button></div></div>`;
    const step=(n,t,d)=>`<div class="flex gap-3"><span class="h-6 w-6 rounded-lg grad grid place-items-center text-[11px] font-bold text-white shrink-0">${n}</span><div class="min-w-0"><div class="text-[13px] font-medium text-slate-200">${t}</div><div class="text-xs text-slate-500 mt-0.5 leading-relaxed">${d}</div></div></div>`;
    $('#view').innerHTML=`<div class="max-w-3xl space-y-4">
      <div class="card p-5">
        <div class="flex items-center gap-2 mb-2 font-semibold"><i data-lucide="hammer" class="text-accent"></i> Draft a new tool</div>
        <div class="text-sm text-slate-400 mb-3">Describe a read-only capability in plain English. Nothing touches client systems during drafting.</div>
        <textarea id="bd" rows="3" placeholder="e.g. List Cylance devices that haven't checked in for 30 days" class="w-full bg-ink/80 border border-edge rounded-lg px-3 py-2 text-sm focus:border-accent focus:outline-none"></textarea>
        <div class="flex items-center gap-2 mt-2"><button id="bd-go" class="grad text-white rounded-lg px-4 py-2 text-sm font-semibold inline-flex items-center gap-1"><i data-lucide="sparkles"></i> Generate draft</button>
          <span id="bd-status" class="text-xs text-slate-500"></span></div>
      </div>
      <details class="card p-5">
        <summary class="cursor-pointer select-none font-semibold flex items-center gap-2"><i data-lucide="graduation-cap" class="text-accent"></i> How AI tool-building works — the full flow</summary>
        <div class="space-y-3 mt-4">
          ${step(1,'You describe it (above)','One or two sentences about what you want the tool to look up. Pick the model you trust for code.')}
          ${step(2,'The AI writes the code — into quarantine','The draft lands in a sandbox folder, NOT in the live system. It cannot run from there. It appears below as a <b class="text-slate-300">pending capability</b>. (This is not the Skills tab — Skills are saved procedures the agent learned; this is brand-new tool code.)')}
          ${step(3,'The machine checks it first','An automatic security scan rejects anything dangerous: shell/network/file access is hard-blocked, and AI drafts may only READ — they can never write to or change client systems.')}
          ${step(4,'You review and decide','Read the code below (or just the description). <b class="text-slate-300">Approve & promote</b> moves it to the Capabilities tab — still switched OFF. <b class="text-slate-300">Discard</b> deletes it. Nothing goes live without your click.')}
          ${step(5,'You test it, then switch it on','See the testing steps below. Until you flip its Enabled switch in Capabilities, the AI cannot touch it.')}
        </div>
        <div class="mt-5 pt-4 border-t border-edge/40">
          <div class="font-semibold text-sm mb-3 flex items-center gap-2"><i data-lucide="flask-conical" class="text-accent"></i> How to test a promoted tool</div>
          <div class="space-y-3">
            ${step('a','Enable it','Capabilities → find it in its group → flip <b class="text-slate-300">Enabled</b>. It is read-only, so the worst case is a wrong or failed answer — it cannot change anything.')}
            ${step('b','Probe it in Chat','Pick a client and ask a question that needs it — you can even say “use &lt;tool name&gt;”. Watch the tool chip under the answer: green ✓ = ran, red ✗ = failed.')}
            ${step('c','Verify the data','Expand “returned data” under the answer and sanity-check a few values against the vendor portal. Every call is also in the Audit tab.')}
            ${step('d','Not right? You stay in control','Disable it (kill switch), fix it yourself with the &lt;/&gt; code editor in Capabilities (validated, instant), or delete it (recoverable).')}
          </div>
        </div>
      </details>
      <div class="flex items-center gap-2 px-1 pt-1">
        <i data-lucide="inbox" class="text-accent text-sm"></i><span class="font-semibold text-sm">Pending capabilities — awaiting your approval</span>
        <span class="pill bg-white/5 text-slate-300">${candidates.length}</span></div>
      <div class="space-y-3">${candidates.length?candidates.map(cand).join(''):'<div class="text-sm text-slate-500 px-1">None waiting. Draft one above — it will appear here for your review before it can go anywhere near the live system.</div>'}</div></div>`;
    if(window._buildPrefill){ $('#bd').value=window._buildPrefill; delete window._buildPrefill; $('#bd').focus(); }
    $('#bd-go').onclick=async()=>{const desc=$('#bd').value.trim();if(!desc)return;
      $('#bd-status').textContent='drafting…';
      const r=await api('POST','/api/build/draft',{description:desc,model:MODEL});
      $('#bd-status').textContent='';
      if(r.error){toast(esc(r.error),false);return;}
      toast(r.validation&&r.validation.ok?'draft generated & validated':'draft generated — review issues',!!(r.validation&&r.validation.ok));
      route('build');};
    document.querySelectorAll('.bp-promote').forEach(b=>b.onclick=async()=>{const r=await api('POST','/api/build/'+encodeURIComponent(b.dataset.n)+'/promote');
      r.ok?(toast('promoted — find it in Capabilities (disabled)'),route('build')):toast(esc(r.error||'promote failed'),false);});
    document.querySelectorAll('.bp-reject').forEach(b=>b.onclick=async()=>{await api('POST','/api/build/'+encodeURIComponent(b.dataset.n)+'/reject');toast('discarded');route('build');});
    icons();
  },

  async files(){
    if(!ME||ME.role!=='admin'){$('#view').innerHTML=`<div class="card p-5 max-w-2xl text-sm text-slate-400">The file manager is admin-only.</div>`;return;}
    window._fsPath=window._fsPath||'/opt/msp-ai';
    let d; try{ d=await api('GET','/api/fs/list?path='+encodeURIComponent(window._fsPath)); }catch(_){ d={error:'request failed'}; }
    if(d.error){ toast(d.error,false); if(window._fsPath!=='/opt/msp-ai'){ window._fsPath='/opt/msp-ai'; return VIEWS.files(); } return; }
    window._fsPath=d.path;
    const showH=!!window._fsHidden;
    const fmt=n=>n==null?'':n<1024?n+' B':n<1048576?(n/1024).toFixed(0)+' KB':(n/1048576).toFixed(1)+' MB';
    const entries=d.entries.filter(e=>showH||!e.hidden);
    const row=e=>`<button class="fs-ent w-full text-left px-3 py-2 flex items-center gap-2.5 hover:bg-white/5 transition rounded-lg" data-path="${esc(e.path)}" data-dir="${e.dir?1:0}" style="opacity:${e.hidden?.6:1}">
        <i data-lucide="${e.dir?'folder':'file-text'}" class="${e.dir?'text-accent':'text-slate-500'} shrink-0"></i>
        <span class="flex-1 min-w-0 text-[13px] truncate">${esc(e.name)}${e.link?' <span class="text-slate-600">→</span>':''}</span>
        <span class="text-[10px] font-mono text-slate-600 shrink-0">${esc(e.octal||'')}</span>
        ${e.dir?'':`<span class="text-[10px] text-slate-500 shrink-0 w-14 text-right">${fmt(e.size)}</span>`}</button>`;
    $('#view').innerHTML=`<div class="flex flex-col h-full min-h-0">
      <div class="flex items-center gap-2 mb-2 shrink-0 flex-wrap">
        <span class="font-mono text-[13px] text-slate-300 truncate max-w-[40vw]" title="${esc(d.path)}">${esc(d.path)}</span>
        <label class="text-[11px] text-slate-500 flex items-center gap-1.5 cursor-pointer ml-2"><input type="checkbox" id="fsHidden" ${showH?'checked':''}> hidden</label>
        <div class="ml-auto flex items-center gap-1.5">
          <input type="file" id="fsUpInput" multiple class="hidden">
          <button id="fsUpload" class="hbtn hbtn-accent"><i data-lucide="upload" class="text-[13px]"></i> Upload</button>
          <button id="fsMkdir" class="hbtn"><i data-lucide="folder-plus" class="text-[13px]"></i> <span class="hidden sm:inline">New folder</span></button>
        </div></div>
      <div class="flex items-center gap-1.5 mb-3 shrink-0 flex-wrap">${d.roots.map(r=>`<button class="fs-root font-mono text-[11px] px-2 py-1 rounded-md ${r===d.path?'text-accent':'text-slate-500 hover:text-slate-300'} bg-white/[.04]" data-path="${esc(r)}">${esc(r)}</button>`).join('')}</div>
      <div class="flex-1 min-h-0 flex gap-3">
        <div class="w-80 shrink-0 card p-2 overflow-auto">
          ${d.parent?`<button class="fs-ent w-full text-left px-3 py-2 flex items-center gap-2.5 hover:bg-white/5 rounded-lg text-slate-400" data-path="${esc(d.parent)}" data-dir="1"><i data-lucide="corner-left-up" class="shrink-0"></i><span class="text-[13px]">..</span></button>`:''}
          ${entries.map(row).join('')||'<div class="px-3 py-4 text-xs text-slate-600">Empty.</div>'}
        </div>
        <div id="fsPane" class="flex-1 min-w-0 card flex flex-col min-h-0 overflow-hidden">
          <div class="flex-1 grid place-items-center text-center p-6 text-sm text-slate-500">Pick a file to preview or edit it.<br>Folders open on click.</div>
        </div></div></div>`;
    icons();
    $('#fsHidden').onchange=e=>{ window._fsHidden=e.target.checked; VIEWS.files(); };
    document.querySelectorAll('.fs-root').forEach(b=>b.onclick=()=>{ window._fsPath=b.dataset.path; VIEWS.files(); });
    document.querySelectorAll('.fs-ent').forEach(b=>b.onclick=()=>{ if(b.dataset.dir==='1'){ window._fsPath=b.dataset.path; VIEWS.files(); } else openFile(b.dataset.path); });
    $('#fsMkdir').onclick=async()=>{ const n=prompt('New folder name:'); if(n===null||!n.trim())return;
      const r=await api('POST','/api/fs/mkdir',{dir:d.path,name:n.trim()});
      if(r&&r.ok){ toast('Folder created'); VIEWS.files(); } else toast((r&&r.error)||'failed',false); };
    $('#fsUpload').onclick=()=>$('#fsUpInput').click();
    $('#fsUpInput').onchange=async e=>{ const files=[...e.target.files]; if(!files.length)return;
      for(const f of files){ if(f.size>25*1024*1024){ toast(`${f.name}: too large (25 MB max)`,false); continue; }
        const b64=await new Promise(res=>{ const rd=new FileReader(); rd.onload=()=>res(rd.result.split(',')[1]); rd.readAsDataURL(f); });
        const r=await api('POST','/api/fs/upload',{dir:d.path,name:f.name,content_b64:b64});
        if(r&&r.ok) toast(`Uploaded ${f.name} (${fmt(r.size)})`); else toast(`${f.name}: ${(r&&r.error)||'failed'}`,false); }
      VIEWS.files(); };
    async function act(p,kind){ // shared chmod/delete/download actions for the pane
      if(kind==='chmod'){ const cur=(d.entries.find(x=>x.path===p)||{}).octal||'644';
        const m=prompt('Permissions (octal, e.g. 644 / 755):',cur); if(m===null)return;
        const r=await api('POST','/api/fs/chmod',{path:p,mode:m.trim()});
        if(r&&r.ok){ toast('Permissions set → '+r.mode); VIEWS.files(); } else toast((r&&r.error)||'failed',false); }
      else if(kind==='delete'){ if(!confirm(`Delete ${p}?`))return;
        const r=await api('POST','/api/fs/delete',{path:p});
        if(r&&r.ok){ toast('Deleted'); VIEWS.files(); } else toast((r&&r.error)||'failed',false); }
      else if(kind==='download'){ window.open('/api/fs/download?path='+encodeURIComponent(p),'_blank'); } }
    async function openFile(p){
      const pane=$('#fsPane'); pane.innerHTML='<div class="p-4 text-sm text-slate-500">loading…</div>';
      let f; try{ f=await api('GET','/api/fs/file?path='+encodeURIComponent(p)); }catch(_){ f={error:'request failed'}; }

          <span class="font-mono text-[11px] text-slate-500 truncate flex-1 min-w-[8rem]" title="${esc(p)}">${esc(p.split('/').pop())}${f.size!=null?` · ${fmt(f.size)}`:''}</span>

        <td class="p-3 text-center">${a.result_ok==null?'<span class="text-slate-600">·</span>':(a.result_ok?'<i data-lucide="check-circle-2" class="text-emerald-400"></i>':'<i data-lucide="x-circle" class="text-rose-400"></i>')}</td></tr>`;}).join('')

      `</tbody></table></div>`;icons();
    const fld=(k,v,mono)=>v?`<div class="px-4 py-2 border-b border-edge/30 flex gap-3"><span class="text-[11px] uppercase tracking-wide text-slate-500 w-24 shrink-0 pt-0.5">${k}</span><span class="text-[13px] ${mono?'font-mono':''} text-slate-200 min-w-0 break-words">${v}</span></div>`:'';

      openDrawer({title:lbl,icon:ic,render:body=>{ body.innerHTML=`
        <div class="px-4 py-3 border-b border-edge flex items-center gap-2.5">

        icons(); }});});
  },
};

async function editUser(username, role, email){
  const newRole=prompt(`Role for ${username} (admin or user):`, role); if(newRole===null) return;
  const newEmail=prompt(`Email for ${username} (blank = none):`, email||''); if(newEmail===null) return;
  const newPass=prompt(`New password for ${username} (blank = keep current):`, '');
  const body={role:newRole.trim(), email:newEmail.trim()}; if(newPass) body.password=newPass;
  const r=await api('POST','/api/users/'+encodeURIComponent(username), body);
  r.ok?(toast('user updated'),route('settings')):toast(esc(r.error),false);
}
async function toggleCreds(integration, box){
  if(box.dataset.open==='1'){ box.innerHTML=''; box.dataset.open=''; return; }
  box.dataset.open='1';
  const credUrl='/api/integrations/'+encodeURIComponent(integration)+'/credentials';
  const r=await api('GET','/api/integrations/'+encodeURIComponent(integration)+'/fields');
  const label=r.label, fields=(r.fields||[]).filter(f=>!f.hidden);
  const anySet=fields.some(f=>f.set);
  const shadowed=fields.filter(f=>f.shadowed).map(f=>f.key);
  const fieldRow=f=>`<div>
      <label class="text-xs text-slate-300 font-medium flex items-center gap-1.5">${esc(f.label||f.key)}${f.required?'<span class="text-rose-400">*</span>':'<span class="text-[10px] text-slate-600 font-normal">optional</span>'}
        ${f.label?`<span class="text-[10px] text-slate-600 font-mono font-normal">${esc(f.key)}</span>`:''}
        ${f.shadowed?'<span class="text-[10px] text-amber-400">(.env)</span>':''}
        ${f.set?`<span class="ml-auto text-[10px] text-slate-600 font-mono">${esc(f.fingerprint)}</span>
          <button data-clearkey="${esc(f.key)}" class="cred-clear text-slate-500 hover:text-rose-300" aria-label="Clear this value" title="Clear this value"><i data-lucide="x" class="text-[12px]"></i></button>`:''}</label>
      ${f.help?`<div class="text-[11px] text-slate-500 leading-snug mt-0.5">${esc(f.help)}</div>`:''}
      <input data-key="${esc(f.key)}" type="${f.secret===false?'text':'password'}" autocomplete="new-password"
        ${f.secret===false&&f.value!==undefined?`value="${esc(f.value)}"`:''}
        placeholder="${f.set?(f.secret===false?'(set)':'•••••• (set) — type to replace'):esc(f.placeholder||'not set')}"
        class="cred-in w-full bg-ink/80 border border-edge rounded-lg px-3 py-1.5 text-sm mt-1 focus:border-accent focus:outline-none"/></div>`;
  const req=fields.filter(f=>f.required), opt=fields.filter(f=>!f.required);
  box.innerHTML=`<div class="border-t border-edge pt-3 space-y-2.5">
    <div class="text-[11px] text-slate-500 flex items-center gap-1"><i data-lucide="shield-check"></i> Stored 0600. Secrets show only a fingerprint (type to replace); settings show their value and can be edited in place.</div>
    ${shadowed.length?`<div class="text-[11px] text-amber-300 bg-amber-500/10 border border-amber-500/30 rounded-lg px-2.5 py-1.5 flex items-start gap-1.5">
      <i data-lucide="alert-triangle" class="text-[12px] mt-0.5"></i><span>${shadowed.map(esc).join(', ')} ${shadowed.length>1?'are':'is'} set in the server <code>.env</code> and override${shadowed.length>1?'':'s'} anything entered here. Edit <code>/opt/msp-ai/.env</code> (and restart) to change ${shadowed.length>1?'them':'it'}.</span></div>`:''}
    ${req.map(fieldRow).join('')}
    ${opt.length?`<details ${opt.some(f=>f.set)?'open':''} class="pt-1">
      <summary class="cursor-pointer select-none text-[11px] uppercase tracking-wide text-slate-500 hover:text-slate-300">Optional settings (${opt.length})</summary>
      <div class="space-y-2.5 mt-2">${opt.map(fieldRow).join('')}</div></details>`:''}
    <div class="flex gap-2 pt-1">
      <button class="cred-save grad text-white rounded-lg px-3 py-1.5 text-xs font-semibold flex-1 flex items-center justify-center gap-1"><i data-lucide="save"></i> Save</button>
      <button class="cred-cancel bg-white/5 border border-edge rounded-lg px-3 py-1.5 text-xs">Cancel</button>
      ${anySet?`<button class="cred-clearall bg-rose-500/10 text-rose-300 border border-rose-500/30 rounded-lg px-3 py-1.5 text-xs flex items-center gap-1"><i data-lucide="trash-2" class="text-[12px]"></i> Clear all</button>`:''}
    </div></div>`;
  const reopen=()=>{ box.dataset.open=''; toggleCreds(integration, box); };
  box.querySelector('.cred-cancel').onclick=()=>{box.innerHTML='';box.dataset.open='';};
  box.querySelectorAll('.cred-clear').forEach(b=>b.onclick=async()=>{
    const r=await api('POST',credUrl,{[b.dataset.clearkey]:''});
    if(r&&r.error){ toast(esc(r.error),false); return; }
    toast(`${b.dataset.clearkey} cleared`); reopen();
  });
  const ca=box.querySelector('.cred-clearall');
  if(ca) ca.onclick=async()=>{
    if(!confirm(`Clear ALL ${label} credentials? This removes every stored value for this integration.`)) return;
    const all={}; fields.forEach(f=>{ all[f.key]=''; });
    const r=await api('POST',credUrl,all);
    if(r&&r.error){ toast(esc(r.error),false); return; }
    toast(`${label} credentials cleared`); box.innerHTML=''; box.dataset.open=''; VIEWS.integrations();
  };
  box.querySelector('.cred-save').onclick=async()=>{
    const vals={}; box.querySelectorAll('.cred-in').forEach(inp=>{ if(inp.value!=='') vals[inp.dataset.key]=inp.value; });
    if(!Object.keys(vals).length){ toast('nothing to save — type a value to replace, or use Clear all',false); return; }
    const r=await api('POST',credUrl,vals);
    if(r.error){ toast(esc(r.error),false); return; }
    toast(`${label} credentials saved`); box.innerHTML=''; box.dataset.open=''; VIEWS.integrations();
  };
  if(integration==='openai') await chatgptSignin(box);
  if(integration==='msteams') await teamsPanel(box);
  if(integration==='email') await emailPanel(box);
  if(integration==='m365') await m365Signin(box);
  icons();
}
// "Sign in with Microsoft" — PER CLIENT (D-33). One app (client id above) is reused; each MSP AI
// client signs in separately with that client's own admin (password + MFA at microsoft.com/
// devicelogin). We store each client's token, never the password.
async function m365Signin(box){
  const data=await api('GET','/api/integrations/m365/clients').catch(()=>({clients:[],app_configured:false,using_builtin:true}));
  const sec=document.createElement('div');
  sec.className='border-t border-edge mt-3 pt-3 space-y-2';
  const ago=ts=>{ if(!ts) return ''; const s=Math.max(0,Math.floor(Date.now()/1000)-ts);
    if(s<3600) return Math.floor(s/60)+'m ago'; if(s<86400) return Math.floor(s/3600)+'h ago';
    return Math.floor(s/86400)+'d ago'; };
  const inDays=ts=>{ if(!ts) return null; return Math.floor((ts-Date.now()/1000)/86400); };
  const status=c=>{
    if(!c.connected) return '<span class="text-[10px] text-slate-500">not connected</span>';
    if(c.last_error) return `<span class="text-[10px] text-rose-400 flex items-center gap-1" title="${esc(c.last_error)}"><i data-lucide="alert-triangle" class="text-[10px]"></i> re-sign-in needed</span>`;
    const d=inDays(c.refresh_valid_until);
    const warn=d!==null&&d<14;
    return `<span class="text-[10px] ${warn?'text-amber-400':'text-slate-500'}">${c.last_refresh?'renewed '+ago(c.last_refresh):'connected'}${d!==null?` · auto-renews (good ~${d}d)`:''}</span>`;
  };
  // Exchange Online is a SECOND per-client connection (D-41) — different token audience,
  // same device-code flow; powers shared-mailbox/permission tools.
  const actBtn=(t,svc,conn,err)=>`<button class="m3-act ml-auto text-[11px] ${conn?'text-slate-500 hover:text-rose-300':'text-accent hover:underline'}" data-t="${esc(t)}" data-svc="${svc}" data-conn="${conn?1:''}">${conn?(err?'Re-sign-in →':'Disconnect'):'Sign in →'}</button>`;
  const row=c=>{const e=c.exo||{connected:false}, sp=c.spo||{connected:false};
    return `<div class="border-b border-edge/40 py-1.5" data-t="${esc(c.tenant)}">
      <div class="flex items-center gap-2 text-xs">
        <i data-lucide="${!c.connected?'building':c.last_error?'alert-triangle':'badge-check'}" class="${!c.connected?'text-slate-600':c.last_error?'text-rose-400':'text-emerald-300'} text-[13px]"></i>
        <div class="min-w-0"><div class="font-medium truncate">${esc(c.tenant)}</div><span class="text-[10px] text-slate-600 mr-1">Graph</span>${status(c)}</div>
        ${actBtn(c.tenant,'m365',c.connected,c.last_error)}</div>
      <div class="flex items-center gap-2 text-xs mt-1 pl-[3px]">
        <i data-lucide="${!e.connected?'mail':e.last_error?'alert-triangle':'mail-check'}" class="${!e.connected?'text-slate-600':e.last_error?'text-rose-400':'text-emerald-300'} text-[12px]"></i>
        <div class="min-w-0"><span class="text-[10px] text-slate-600 mr-1">Exchange</span>${status(e)}</div>
        ${actBtn(c.tenant,'exo',e.connected,e.last_error)}</div>
      <div class="flex items-center gap-2 text-xs mt-1 pl-[3px]">
        <i data-lucide="${!sp.connected?'folder':sp.last_error?'alert-triangle':'folder-check'}" class="${!sp.connected?'text-slate-600':sp.last_error?'text-rose-400':'text-emerald-300'} text-[12px]"></i>
        <div class="min-w-0"><span class="text-[10px] text-slate-600 mr-1">SharePoint</span>${status(sp)}</div>
        ${actBtn(c.tenant,'spo',sp.connected,sp.last_error)}</div></div>`;};
  const anyConn=data.clients.some(c=>c.connected);
  sec.innerHTML=`<div class="text-xs font-medium flex items-center gap-1.5"><i data-lucide="building-2" class="text-accent text-[12px]"></i> Per-client Microsoft 365 sign-in
      ${anyConn?`<button class="m3-renew ml-auto text-[10px] text-slate-500 hover:text-accent inline-flex items-center gap-1" title="Refresh every connected client's token now"><i data-lucide="refresh-cw" class="text-[10px]"></i> Renew all</button>`:''}</div>
    <div class="text-[11px] text-slate-500">Each client signs in once with its own admin (password + MFA at Microsoft). No app registration needed — ${data.using_builtin?"sign-in uses Microsoft's built-in app":'using your own app from the field above'}. Tokens ${data.renew_hours>0?`auto-renew every ${data.renew_hours}h so they never go stale`:'auto-renew on use'}; the agent reads a client's Graph data only when that client is selected. <b class="text-slate-400">Exchange</b> is a second sign-in per client (Exchange admin) that powers mailbox tools (shared mailboxes, permissions); <b class="text-slate-400">SharePoint</b> is a third (SharePoint/Global admin) that powers OneDrive site-admin grants — sign Graph in first so its hostname can be discovered.</div>
    ${data.clients.length>8?`<input class="m3-search w-full bg-ink/70 border border-edge rounded-lg px-2.5 py-1.5 text-xs mt-1 focus:border-accent focus:outline-none" placeholder="Search ${data.clients.length} clients…" autocomplete="off">`:''}
    <div class="m3-list"></div>
    <div class="m3-flow"></div>`;
  box.firstElementChild.appendChild(sec);

      <div class="font-mono text-xl tracking-[.25em] text-center bg-ink/80 border border-edge rounded-lg py-2.5 my-2 select-all">${esc(r.user_code)}</div>
      <a href="${esc(openUrl)}" target="_blank" rel="noopener" class="m3-open w-full grad text-white rounded-lg py-2 text-xs font-semibold flex items-center justify-center gap-1.5"><i data-lucide="external-link" class="text-[12px]"></i> Open Microsoft sign-in page</a>
      <div class="text-[10px] text-slate-500 mt-1.5 leading-snug flex items-start gap-1"><i data-lucide="info" class="text-[11px] mt-0.5 shrink-0"></i><span>Signing into several clients? <b class="text-slate-400">Right-click the button → Open link in incognito/private window</b> (or use a separate browser profile) so each client's login starts clean — no account carried over. ${r.verification_uri_complete?'The code is pre-filled on that page.':'Enter the code above on the page.'}</span></div>
      <div class="m3-stat text-[11px] text-slate-500 flex items-center gap-1.5 mt-1.5"><i data-lucide="loader-2" class="animate-spin"></i> Waiting for ${esc(tenant)} to finish signing in…</div></div>`;
    icons();
    const iv=Math.max(3,+r.interval||5)*1000, deadline=Date.now()+(+r.expires_in||900)*1000;
    clearInterval(window._m3Poll);

      if(p.status==='connected'){ clearInterval(window._m3Poll); toast(`${svcName} connected for ${tenant}`); refresh(); }
      else if(p.status==='error'){ clearInterval(window._m3Poll);

    },iv);

}
