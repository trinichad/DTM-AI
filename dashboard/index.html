// MS Teams card extra (D-29): who may chat with the bot (default DENY) + the webhook endpoint.
async function teamsPanel(box){
  const al=await api('GET','/api/integrations/msteams/allowlist');
  const cert=await api('GET','/api/integrations/msteams/cert');
  const acctUsers=((await api('GET','/api/users').catch(()=>({users:[]}))).users||[]).map(x=>x.username);
  // ── app certificate (alternative to the client secret; private key stays on the server) ──
  const cs=document.createElement('div');
  cs.className='border-t border-edge mt-3 pt-3 space-y-2';
  cs.innerHTML=`
    <div class="text-xs font-medium flex items-center gap-1.5"><i data-lucide="file-key-2" class="text-accent text-[12px]"></i> App certificate
      <span class="pill ${cert.auth_method==='certificate'?'bg-emerald-500/15 text-emerald-300':cert.auth_method==='client_secret'?'bg-slate-600/30 text-slate-400':'bg-amber-500/15 text-amber-300'}">auth: ${esc(cert.auth_method==='none'?'nothing set yet':cert.auth_method.replace('_',' '))}</span></div>
    ${cert.exists
      ?`<div class="text-[11px] text-slate-500 font-mono">thumbprint ${esc((cert.thumbprint||'').slice(0,20))}… · expires ${esc((cert.not_after||'').slice(0,10))}</div>
        <div class="text-[11px] text-slate-500">Upload the public .cer in Entra → App registrations → your app → <b>Certificates & secrets → Upload certificate</b>. The certificate is used instead of the secret automatically.</div>
        <div class="flex gap-2">
          <button class="tc-dl bg-white/5 hover:bg-white/10 border border-edge rounded-lg px-3 py-1.5 text-xs inline-flex items-center gap-1"><i data-lucide="download" class="text-[12px]"></i> Download .cer</button>
          <button class="tc-gen bg-white/5 hover:bg-white/10 border border-edge rounded-lg px-3 py-1.5 text-xs">Regenerate…</button>
          <button class="tc-del bg-rose-500/10 text-rose-300 border border-rose-500/30 rounded-lg px-3 py-1.5 text-xs">Delete</button></div>`
      :`<div class="text-[11px] text-slate-500">More secure than a client secret: generate a certificate here, upload its public half to the app registration in Office 365 / Entra, and no shared secret ever exists. The private key never leaves this server.</div>
        <button class="tc-gen bg-white/5 hover:bg-white/10 border border-edge rounded-lg px-3 py-1.5 text-xs inline-flex items-center gap-1"><i data-lucide="file-key-2" class="text-[12px]"></i> Generate certificate</button>`}`;
  box.firstElementChild.appendChild(cs);
  const reopen=()=>{box.innerHTML='';box.dataset.open='';toggleCreds('msteams',box);};
  const dlCer=(pem,thumb)=>{const a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob([pem],{type:'application/x-pem-file'}));
    a.download='msp-ai-teams-bot-'+(thumb||'cert').slice(0,8).toLowerCase()+'.cer'; a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href),5000);};
  cs.querySelectorAll('.tc-gen').forEach(b=>b.onclick=async()=>{
    if(cert.exists&&!confirm('Regenerate the certificate? The old one stops working — you must upload the NEW .cer in Entra.'))return;
    const r=await api('POST','/api/integrations/msteams/cert');
    if(r.error){toast(esc(r.error),false);return;}
    toast('certificate generated — downloading the .cer to upload in Entra');
    dlCer(r.public_pem,r.thumbprint); reopen();});
  const dl=cs.querySelector('.tc-dl'); if(dl) dl.onclick=()=>dlCer(cert.public_pem,cert.thumbprint);
  const del=cs.querySelector('.tc-del'); if(del) del.onclick=async()=>{
    if(!confirm('Delete the certificate? The bot falls back to the client secret (if set) — otherwise it stops authenticating.'))return;
    const r=await api('DELETE','/api/integrations/msteams/cert');
    r.ok?(toast('certificate deleted'),reopen()):toast(esc(r.error),false);};
  const sec=document.createElement('div');
  sec.className='border-t border-edge mt-3 pt-3 space-y-2';
  const row=(e,i)=>`<div class="flex items-center gap-2 text-xs border-b border-edge/40 py-1.5">
      <i data-lucide="user-check" class="text-emerald-300 text-[12px]"></i>
      <span class="font-medium">${esc(e.name||'(unnamed)')}</span>
      <span class="text-slate-600 font-mono truncate">${esc(e.id)}</span>
      ${e.user?`<span class="pill bg-indigo-500/15 text-indigo-300 text-[10px]" title="Linked dashboard account — the agent uses this account's email + profile memory in Teams">@${esc(e.user)}</span>`:''}
      <button data-i="${i}" class="tw-del ml-auto text-slate-500 hover:text-rose-300"><i data-lucide="x" class="text-[12px]"></i></button></div>`;
  sec.innerHTML=`
    <div class="text-xs font-medium flex items-center gap-1.5"><i data-lucide="shield-check" class="text-accent text-[12px]"></i> Who can chat with the bot</div>
    <div class="text-[11px] ${al.entries.length||al.allow_all?'text-slate-500':'text-amber-300'}">${al.allow_all
      ?'⚠️ Allow-all is ON — anyone who can message the bot can use it.'
      :al.entries.length?'Only these users (matched on Entra/AAD object id). Everyone else is refused.'
      :'Default DENY: nobody can chat until you add a user (Entra → Users → Object ID, or `teams status --verbose`).'}</div>
    <div class="tw-list">${al.entries.map(row).join('')}</div>
    <div class="flex gap-2"><input class="tw-name w-24 bg-ink/80 border border-edge rounded-lg px-2.5 py-1.5 text-xs" placeholder="name">
      <input class="tw-id flex-1 bg-ink/80 border border-edge rounded-lg px-2.5 py-1.5 text-xs font-mono" placeholder="AAD object id">
      <select class="tw-user w-28 bg-ink/80 border border-edge rounded-lg px-1.5 py-1.5 text-xs" title="Link to a dashboard account so the agent knows who this is (email, profile memory)">
        <option value="">no account</option>${acctUsers.map(u=>`<option value="${esc(u)}">${esc(u)}</option>`).join('')}</select>
      <button class="tw-add bg-white/5 hover:bg-white/10 border border-edge rounded-lg px-3 text-xs"><i data-lucide="plus" class="text-[12px]"></i></button></div>
    <label class="flex items-center gap-2 text-[11px] text-slate-500"><input type="checkbox" class="tw-all" ${al.allow_all?'checked':''}> Allow ALL Teams users (not recommended)</label>
    <div class="text-[11px] text-slate-500 border-t border-edge/40 pt-2">Bot endpoint for the Azure registration:<br>
      <code class="text-slate-400 select-all">${esc(location.origin)}${esc(al.webhook_path)}</code>
      ${al.enabled?'':'<br><span class="text-rose-400">webhook disabled (MSPAI_TEAMS=0)</span>'}</div>`;
  box.firstElementChild.appendChild(sec);
  const save=async(entries,allow_all)=>{
    const r=await api('POST','/api/integrations/msteams/allowlist',{entries,allow_all});
    if(r.error){toast(esc(r.error),false);return;}
    toast('Teams allowlist saved'); box.innerHTML=''; box.dataset.open=''; toggleCreds('msteams',box);};
  sec.querySelector('.tw-add').onclick=()=>{
    const id=sec.querySelector('.tw-id').value.trim(), name=sec.querySelector('.tw-name').value.trim(),
          user=sec.querySelector('.tw-user').value;
    if(!id){toast('AAD object id required',false);return;}
    save([...al.entries,{id,name,user}],al.allow_all);};
  sec.querySelectorAll('.tw-del').forEach(b=>b.onclick=()=>{
    const e=[...al.entries]; e.splice(+b.dataset.i,1); save(e,al.allow_all);});
  sec.querySelector('.tw-all').onchange=ev=>{
    if(ev.target.checked&&!confirm('Really allow EVERY Teams user to command the bot? The allowlist is the main safety gate.')){ev.target.checked=false;return;}
    save(al.entries,ev.target.checked);};

// "Sign in with ChatGPT" (D-26): the OpenAI card's second auth mode — Codex device flow,

async function chatgptSignin(box){
  const cx=await api('GET','/api/integrations/openai_codex/fields');
  const rt=(cx.fields||[]).find(f=>f.key==='OPENAI_CODEX_REFRESH_TOKEN');
  const sec=document.createElement('div');

  sec.innerHTML=rt&&rt.set
    ?`<div class="text-xs text-slate-300 flex items-center gap-1.5"><i data-lucide="badge-check" class="text-emerald-300"></i> ChatGPT plan connected — GPT-5.5 available in chat
        <span class="ml-auto text-[10px] text-slate-600 font-mono">${esc(rt.fingerprint||'')}</span></div>
      <button class="cx-disc w-full text-xs bg-rose-500/10 text-rose-300 border border-rose-500/30 rounded-lg py-2 flex items-center justify-center gap-1.5"><i data-lucide="unlink" class="text-[12px]"></i> Disconnect ChatGPT</button>`
    :`<div class="text-[11px] text-slate-500">No API key? Connect your ChatGPT Plus subscription instead — same sign-in Codex uses.</div>
      <button class="cx-start w-full text-xs grad text-white rounded-lg py-2 font-semibold flex items-center justify-center gap-1.5"><i data-lucide="message-circle" class="text-[12px]"></i> Sign in with ChatGPT</button>
      <div class="cx-flow"></div>`;
  box.firstElementChild.appendChild(sec);
  const st=sec.querySelector('.cx-start');
  if(st) st.onclick=async()=>{
    st.disabled=true; st.classList.add('opacity-60');
    const r=await api('POST','/api/integrations/openai_codex/oauth/start');
    if(r.error){ toast(esc(r.error),false); st.disabled=false; st.classList.remove('opacity-60'); return; }
    const fl=sec.querySelector('.cx-flow');
    fl.innerHTML=`<div class="text-xs text-slate-300 leading-relaxed mt-1">
        1. Open <a href="${esc(r.verification_url)}" target="_blank" rel="noopener" class="text-accent underline">${esc(r.verification_url)}</a> and sign in to OpenAI<br>2. Enter this one-time code <span class="text-slate-500">(expires in 15 min — never share it)</span>:</div>
      <div class="font-mono text-xl tracking-[.25em] text-center bg-ink/80 border border-edge rounded-lg py-2.5 my-2 select-all">${esc(r.user_code)}</div>
      <div class="cx-stat text-[11px] text-slate-500 flex items-center gap-1.5"><i data-lucide="loader-2" class="animate-spin"></i> Waiting for approval in your browser…</div>`;
    icons();
    const iv=Math.max(3,+r.interval||5)*1000, t0=Date.now();
    clearInterval(window._cxPoll);
    window._cxPoll=setInterval(async()=>{
      if(!document.body.contains(fl)){ clearInterval(window._cxPoll); return; }
      const stat=fl.querySelector('.cx-stat');
      if(Date.now()-t0>15*60*1000){ clearInterval(window._cxPoll);
        stat.className='cx-stat text-[11px] text-rose-400 flex items-center gap-1.5';
        stat.innerHTML='<i data-lucide="x-circle"></i> Code expired — click Sign in with ChatGPT to get a new one.'; icons(); return; }
      let p; try{ p=await api('POST','/api/integrations/openai_codex/oauth/poll',
        {device_auth_id:r.device_auth_id,user_code:r.user_code}); }catch(_){ return; }
      if(p.status==='connected'){ clearInterval(window._cxPoll);
        toast('ChatGPT connected — GPT-5.5 is now available in chat');
        box.innerHTML=''; box.dataset.open=''; VIEWS.integrations(); }
      else if(p.error){ clearInterval(window._cxPoll);
        stat.className='cx-stat text-[11px] text-rose-400 flex items-center gap-1.5';
        stat.innerHTML='<i data-lucide="x-circle"></i> '+esc(p.error); icons(); }
    },iv);
  };
  const dc=sec.querySelector('.cx-disc');
  if(dc) dc.onclick=async()=>{
    if(!confirm('Disconnect the ChatGPT plan sign-in? GPT-5.5 disappears from the chat model picker.')) return;
    const r=await api('POST','/api/integrations/openai_codex/credentials',
      {OPENAI_CODEX_ACCESS_TOKEN:'',OPENAI_CODEX_REFRESH_TOKEN:''});
    if(r&&r.error){ toast(esc(r.error),false); return; }
    toast('ChatGPT plan disconnected'); box.innerHTML=''; box.dataset.open=''; VIEWS.integrations();
  };
}
// Help drawers for the integration features (D-27/D-29) — plain-language, step-by-step.
function helpDrawer(topic){
  const h=t=>`<div class="font-semibold text-sm mt-4 mb-1.5 flex items-center gap-1.5 text-slate-200">${t}</div>`;
  const p=t=>`<div class="text-[13px] text-slate-400 leading-relaxed">${t}</div>`;
  const step=(n,t,d)=>`<div class="flex gap-3 mt-2"><span class="h-6 w-6 rounded-lg grad grid place-items-center text-[11px] font-bold text-white shrink-0">${n}</span><div class="min-w-0"><div class="text-[13px] font-medium text-slate-200">${t}</div><div class="text-xs text-slate-500 mt-0.5 leading-relaxed">${d}</div></div></div>`;
  const code=t=>`<pre class="text-[11px] text-slate-300 bg-ink/60 border border-edge rounded-lg p-2.5 mt-1.5 overflow-auto font-mono whitespace-pre-wrap select-all">${t}</pre>`;
  const CONTENT={
    custom:{title:'Custom integrations — how it works',icon:'plug-zap',html:`
      ${p('Connect <b class="text-slate-300">any service that has an API</b> — an SOP/documentation platform, a PSA, a licensing portal — without waiting for a code release. You describe the connection; the AI builds the capabilities afterwards.')}
      ${h('The flow, start to finish')}
      ${step(1,'Create the integration','Click <b>Add integration</b>. Name it, pick <b>API key</b> or <b>Login credential</b> (or custom fields), and name each field whatever the vendor calls it — the labels are yours.')}
      ${step(2,'Point it at the API','Set the <b>base URL</b> (always https) and where the credential goes on the wire: a Bearer token header, HTTP Basic login, a custom header like <code>X-Api-Key</code>, or a query parameter. The vendor’s docs say which.')}
      ${step(3,'Choose what the AI may read','List the <b>readable paths</b> (e.g. <code>/articles</code>, <code>/search</code>). This is a hard allowlist: empty list = the agent can read nothing. Writes are never possible through a custom integration.')}
      ${step(4,'Paste the real keys','On the new card: <b>Manage keys</b>. Values are stored on the server at mode 0600 and only ever shown as fingerprints. Then hit <b>Test</b> to probe the connection.')}
      ${step(5,'Teach the AI the vendor’s API','<b>Docs → KB</b>: paste the vendor’s API documentation URL. The server fetches it (https-only, size-capped) and saves it into the Knowledge Base, where <code>kb_search</code> can find it.')}
      ${step(6,'Build capabilities','<b>Build capabilities</b> jumps to the Build tab pre-filled. The AI drafts read-only tools into a quarantine sandbox — you review and promote them in Capabilities, where they start disabled.')}
      ${h('What you can do right away')}
      ${p('Even before building dedicated tools, the built-in <code>custom_read</code> tool lets you ask in Chat: <i>“using custom_read on sop_kb, get /articles and summarize the onboarding SOP”</i> — any path inside the read allowlist works.')}
      ${h('Security model')}
      ${p('• Credentials live in the same fail-closed store as Kaseya/Cylance/Huntress keys — the model never sees a value, only the server injects it.<br>• Reads are GET-only and path-allowlisted; there is no write path.<br>• Renaming/deleting an integration migrates/clears its stored keys.<br>• Every change and every call is in the Audit tab.')}`},
    msteams:{title:'Microsoft Teams bot — setup guide',icon:'messages-square',html:`
      ${p('Chat with MSP AI from Teams — DM the bot, or @mention it in a group or channel. It answers with the same guarded, audited agent loop as this dashboard, and <b class="text-slate-300">only users you allowlist</b> can talk to it.')}
      ${h('What you need')}
      ${p('• A Microsoft 365 / Entra tenant where you can create an app registration.<br>• This server reachable from the internet over HTTPS with a valid certificate (Teams calls your webhook). Your bot endpoint is:')}
      ${code(esc(location.origin)+'/api/teams/messages')}
      ${h('Easiest path — the Teams CLI')}
      ${step(1,'Install + sign in',code('npm install -g @microsoft/teams.cli@preview\nteams login'))}
      ${step(2,'Create the bot',code('teams app create --name "MSP AI" \\\n  --endpoint "'+esc(location.origin)+'/api/teams/messages"')+'It prints the <b>Client ID</b>, <b>Client Secret</b> and <b>Tenant ID</b> — paste them into this card via <b>Manage keys</b>. (Skip the secret if you use a certificate — below.)')}
      ${step(3,'Install the app in Teams','<code>teams app install</code> (or open the install link the CLI printed). Then DM the bot.')}
      ${h('Manual path — Azure portal')}
      ${step('a','App registration','portal.azure.com → Microsoft Entra ID → App registrations → New. Copy the <b>Application (client) ID</b> and <b>Directory (tenant) ID</b> from its Overview page.')}
      ${step('b','Credential','Certificates & secrets → either create a <b>client secret</b> (copy the value immediately), or <b>upload the certificate</b> you generate on this card (below) — no secret needed then.')}
      ${step('c','Azure Bot resource','Create an “Azure Bot” (free F0 tier), pick “Use existing app registration”, set the <b>messaging endpoint</b> to the URL above, then enable the <b>Microsoft Teams channel</b> on the bot.')}
      ${step('d','Install in Teams','From the bot’s Teams channel page use “Open in Teams”, or package the app manifest via the Teams admin center.')}
      ${h('Certificate instead of a client secret (recommended)')}
      ${p('Open <b>Manage keys</b> on this card → <b>App certificate</b> → Generate. Download the public <code>.cer</code> and upload it in Entra → your app registration → <b>Certificates & secrets → Certificates → Upload certificate</b>. The private key never leaves this server; when a certificate exists it is used automatically instead of the secret.')}
      ${h('The allowlist — who may chat')}
      ${p('Default is <b class="text-slate-300">deny everyone</b>. Add each teammate’s <b>Entra object ID</b>: Entra ID → Users → pick the user → copy <b>Object ID</b> (or run <code>teams status --verbose</code> for your own). Anyone not listed gets “Not authorized” and is logged.')}

  };
  const c=CONTENT[topic]; if(!c) return;
  openDrawer({title:c.title,icon:c.icon,wide:true,render:body=>{body.innerHTML=`<div class="p-5 pb-8">${c.html}</div>`;icons();}});
}
// Integration builder (D-27): create/edit an owner-defined integration — metadata only,
// keys are entered afterwards via the card's "Manage keys" (never through this form).
function integrationBuilder(rec){
  const isNew=!rec;
  const st=rec?JSON.parse(JSON.stringify(rec)):{id:'',label:'',auth_kind:'api_key',
    fields:[{label:'API key',required:true,secret:true}],base_url:'',
    auth:{type:'bearer'},read_paths:[],probe_path:'',docs_url:'',notes:'',verify_tls:true};
  const slug=s=>s.toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_+|_+$/g,'').replace(/^([0-9])/,'x$1').slice(0,40);
  const fkey=l=>(st.id||'x').toUpperCase()+'_'+(l.toUpperCase().replace(/[^A-Z0-9]+/g,'_').replace(/^_+|_+$/g,'')||'VALUE');
  const TEMPLATES={api_key:{fields:[{label:'API key',required:true,secret:true}],auth:{type:'bearer'}},
                   login:{fields:[{label:'Username',required:true,secret:false},{label:'Password',required:true,secret:true}],auth:{type:'basic'}},
                   custom:{fields:[{label:'API key',required:true,secret:true}],auth:{type:'none'}}};
  openDrawer({title:isNew?'Add integration':'Edit '+st.label,icon:'plug-zap',wide:true,render:body=>{
    const draw=()=>{
      const keys=st.fields.map(f=>fkey(f.label));
      const fieldOpt=sel=>keys.map(k=>`<option value="${esc(k)}" ${sel===k?'selected':''}>${esc(k)}</option>`).join('');
      body.innerHTML=`<div class="p-5 space-y-4 text-sm">
        <div class="grid sm:grid-cols-2 gap-3">
          <div><label class="text-xs text-slate-400">Name (label)</label>
            <input id="ib-label" value="${esc(st.label)}" placeholder="e.g. SOP Provider" class="w-full bg-ink/80 border border-edge rounded-lg px-3 py-2 mt-1"></div>
          <div><label class="text-xs text-slate-400">ID ${isNew?'(auto)':'<span class="text-slate-600">— use Rename to change</span>'}</label>
            <input id="ib-id" value="${esc(st.id)}" ${isNew?'':'disabled'} class="w-full bg-ink/80 border border-edge rounded-lg px-3 py-2 mt-1 font-mono text-xs ${isNew?'':'opacity-50'}"></div>
        </div>
        ${isNew?`<div><label class="text-xs text-slate-400">Credential type</label>
          <select id="ib-kind" class="w-full bg-ink/80 border border-edge rounded-lg px-3 py-2 mt-1">
            <option value="api_key" ${st.auth_kind==='api_key'?'selected':''}>API key</option>
            <option value="login" ${st.auth_kind==='login'?'selected':''}>Login credential (username + password)</option>
            <option value="custom" ${st.auth_kind==='custom'?'selected':''}>Custom fields</option></select></div>`:''}
        <div><div class="text-xs text-slate-400 mb-1">Credential fields <span class="text-slate-600">(you name them; values are entered later via Manage keys)</span></div>
          <div class="space-y-1.5">${st.fields.map((f,i)=>`<div class="flex items-center gap-2">
            <input data-i="${i}" class="ib-fl flex-1 bg-ink/80 border border-edge rounded-lg px-2.5 py-1.5 text-xs" value="${esc(f.label)}" placeholder="field label">
            <span class="text-[10px] text-slate-600 font-mono w-40 truncate">${esc(fkey(f.label))}</span>
            <label class="text-[10px] text-slate-500 flex items-center gap-1"><input data-i="${i}" type="checkbox" class="ib-fr" ${f.required?'checked':''}>req</label>
            <label class="text-[10px] text-slate-500 flex items-center gap-1"><input data-i="${i}" type="checkbox" class="ib-fs" ${f.secret?'checked':''}>secret</label>
            <button data-i="${i}" class="ib-fx text-slate-500 hover:text-rose-300">×</button></div>`).join('')}</div>
          <button id="ib-fadd" class="text-xs text-accent mt-1.5">+ add field</button></div>
        <div><label class="text-xs text-slate-400">API base URL (https)</label>
          <input id="ib-base" value="${esc(st.base_url)}" placeholder="https://api.vendor.com/v2" class="w-full bg-ink/80 border border-edge rounded-lg px-3 py-2 mt-1 font-mono text-xs">
          <label class="flex items-start gap-2 text-[11px] text-slate-400 mt-1.5"><input type="checkbox" id="ib-tls" class="mt-0.5" ${st.verify_tls===false?'checked':''}><span>Trust a <b>self-signed certificate</b> — for local/LAN devices (UniFi controller, NAS, firewall…) that don't have a public cert. Leave OFF for public cloud APIs.</span></label></div>
        <div class="grid sm:grid-cols-2 gap-3">
          <div><label class="text-xs text-slate-400">Auth placement</label>
            <select id="ib-atype" class="w-full bg-ink/80 border border-edge rounded-lg px-3 py-2 mt-1">
              ${['bearer','basic','header','query','none'].map(t=>`<option value="${t}" ${st.auth.type===t?'selected':''}>${{bearer:'Authorization: Bearer <field>',basic:'HTTP Basic (user + pass)',header:'Custom header',query:'Query parameter',none:'None'}[t]}</option>`).join('')}</select></div>
          <div id="ib-aextra">
            ${st.auth.type==='bearer'?`<label class="text-xs text-slate-400">Token field</label><select id="ib-afield" class="w-full bg-ink/80 border border-edge rounded-lg px-3 py-2 mt-1 font-mono text-xs">${fieldOpt(st.auth.field)}</select>`:''}
            ${st.auth.type==='basic'?`<label class="text-xs text-slate-400">User / pass fields</label><div class="flex gap-2 mt-1">
              <select id="ib-auser" class="flex-1 bg-ink/80 border border-edge rounded-lg px-2 py-2 font-mono text-xs">${fieldOpt(st.auth.user_field)}</select>
              <select id="ib-apass" class="flex-1 bg-ink/80 border border-edge rounded-lg px-2 py-2 font-mono text-xs">${fieldOpt(st.auth.pass_field)}</select></div>`:''}
            ${(st.auth.type==='header'||st.auth.type==='query')?`<label class="text-xs text-slate-400">${st.auth.type==='header'?'Header name':'Parameter name'} + field</label><div class="flex gap-2 mt-1">
              <input id="ib-aname" value="${esc(st.auth.name||'')}" placeholder="${st.auth.type==='header'?'X-Api-Key':'api_key'}" class="flex-1 bg-ink/80 border border-edge rounded-lg px-2 py-2 font-mono text-xs">
              <select id="ib-afield" class="flex-1 bg-ink/80 border border-edge rounded-lg px-2 py-2 font-mono text-xs">${fieldOpt(st.auth.field)}</select></div>`:''}
          </div></div>
        <div><label class="text-xs text-slate-400">Readable paths <span class="text-slate-600">(one per line — what the agent may GET; empty = agent can read nothing)</span></label>
          <textarea id="ib-paths" rows="3" placeholder="/articles\n/search" class="w-full bg-ink/80 border border-edge rounded-lg px-3 py-2 mt-1 font-mono text-xs">${esc((st.read_paths||[]).join('\n'))}</textarea></div>
        <div class="grid sm:grid-cols-2 gap-3">
          <div><label class="text-xs text-slate-400">Probe path (for Test)</label>
            <input id="ib-probe" value="${esc(st.probe_path)}" placeholder="/health (default: first readable path)" class="w-full bg-ink/80 border border-edge rounded-lg px-3 py-2 mt-1 font-mono text-xs"></div>
          <div><label class="text-xs text-slate-400">Docs URL</label>
            <input id="ib-docs" value="${esc(st.docs_url)}" placeholder="https://docs.vendor.com/api" class="w-full bg-ink/80 border border-edge rounded-lg px-3 py-2 mt-1 font-mono text-xs"></div></div>
        <div><label class="text-xs text-slate-400">Notes (shown to the agent)</label>
          <textarea id="ib-notes" rows="2" class="w-full bg-ink/80 border border-edge rounded-lg px-3 py-2 mt-1">${esc(st.notes)}</textarea></div>
        <div class="flex gap-2 pt-1">
          <button id="ib-save" class="grad text-white rounded-lg px-4 py-2 text-sm font-semibold flex items-center gap-1"><i data-lucide="save"></i> ${isNew?'Create integration':'Save changes'}</button>
          ${isNew?'':`<button id="ib-rename" class="bg-white/5 border border-edge rounded-lg px-3 py-2 text-xs">Rename id…</button>`}
        </div>
        <div class="text-[11px] text-slate-500 flex items-start gap-1.5"><i data-lucide="info" class="text-[12px] mt-0.5"></i>
          After saving: open the card → Manage keys to paste the real credentials, Test to probe, Docs → KB to teach the AI the vendor's API, then Build capabilities.</div>
      </div>`;
      const grab=()=>{
        st.label=$('#ib-label').value.trim();
        if(isNew){ st.id=slug($('#ib-id').value.trim()||st.label); }
        st.base_url=$('#ib-base').value.trim();
        const tls=$('#ib-tls'); st.verify_tls=tls?!tls.checked:(st.verify_tls!==false);
        st.read_paths=$('#ib-paths').value.split('\n').map(s=>s.trim()).filter(Boolean);
        st.probe_path=$('#ib-probe').value.trim(); st.docs_url=$('#ib-docs').value.trim();
        st.notes=$('#ib-notes').value.trim();
        const at=$('#ib-atype').value; const a={type:at};
        if(at==='bearer'){const e=$('#ib-afield'); if(e) a.field=e.value;}
        if(at==='basic'){const u=$('#ib-auser'),p=$('#ib-apass'); if(u) a.user_field=u.value; if(p) a.pass_field=p.value;}
        if(at==='header'||at==='query'){const n=$('#ib-aname'),e=$('#ib-afield'); if(n) a.name=n.value.trim(); if(e) a.field=e.value;}
        st.auth=a;};
      $('#ib-label').oninput=ev=>{ if(isNew){$('#ib-id').value=slug(ev.target.value);} };
      const kind=$('#ib-kind'); if(kind) kind.onchange=ev=>{grab(); st.auth_kind=ev.target.value;
        Object.assign(st,JSON.parse(JSON.stringify(TEMPLATES[ev.target.value]))); draw();};
      $('#ib-atype').onchange=()=>{grab(); draw();};
      body.querySelectorAll('.ib-fl').forEach(e=>e.onchange=ev=>{grab(); st.fields[+ev.target.dataset.i].label=ev.target.value.trim(); draw();});
      body.querySelectorAll('.ib-fr').forEach(e=>e.onchange=ev=>{st.fields[+ev.target.dataset.i].required=ev.target.checked;});
      body.querySelectorAll('.ib-fs').forEach(e=>e.onchange=ev=>{st.fields[+ev.target.dataset.i].secret=ev.target.checked;});
      body.querySelectorAll('.ib-fx').forEach(e=>e.onclick=ev=>{grab(); st.fields.splice(+ev.currentTarget.dataset.i,1); draw();});
      $('#ib-fadd').onclick=()=>{grab(); st.fields.push({label:'',required:false,secret:true}); draw();};
      $('#ib-save').onclick=async()=>{grab();
        if(!st.label){toast('name required',false);return;}
        if(!st.fields.length||st.fields.some(f=>!f.label)){toast('every field needs a label',false);return;}
        const payload={...st, fields:st.fields.map(f=>({label:f.label,required:f.required,secret:f.secret}))};
        const r=await api('POST', isNew?'/api/integrations/custom':'/api/integrations/custom/'+encodeURIComponent(st.id), payload);
        if(r.error){toast(esc(r.error),false);return;}
        toast(isNew?'integration created — now add its keys':'integration saved');
        closeDrawer(); VIEWS.integrations();};
      const rn=$('#ib-rename'); if(rn) rn.onclick=async()=>{
        const nid=prompt('New id (snake_case). Stored credentials move with it:',st.id); if(!nid||nid===st.id)return;
        const r=await api('POST','/api/integrations/custom/'+encodeURIComponent(st.id)+'/rename',{id:nid});
        if(r.error){toast(esc(r.error),false);return;}
        toast('renamed to '+esc(r.id)); closeDrawer(); VIEWS.integrations();};
      icons();};
    draw();}});
}
function toggle(name,field,val,disabled,label){
  const TIP={
    enabled:'Kill switch: OFF = the AI cannot use this tool at all — dispatch refuses it even if the model asks (config, not code).',
    allow_write:'Allows this tool’s WRITE action to run. Read-only tools have nothing to write, so this is locked off for them.',
    require_approval:'ON = every run waits for your sign-off (Approvals bell / inline in chat). OFF = the AI auto-runs this trusted write WITHOUT asking. Locked ON for destructive tools; MSP AI’s own memory/notes always auto-run.'};
  const lock=disabled?(field==='allow_write'?' — locked: read-only tool':field==='require_approval'?' — only applies to client-write tools (destructive always needs approval; MSP AI’s own notes always auto-run)':' — locked'):'';
  return `<div class="flex flex-col items-center gap-1" title="${TIP[field]||''}${lock}">
    <div class="switch ${val?'on':''} ${disabled?'disabled':''}" data-name="${esc(name)}" data-field="${field}"></div>
    <span class="text-[10px] ${disabled?'text-slate-700':'text-slate-500'}">${label}</span></div>`;}
function bubble(who,html,fixedId,ts){const id=fixedId||('m'+Math.random().toString(36).slice(2));const mine=who==='you';
  const ag=CHAT_AGENT||{}, hx=agentHex(ag);
  const face=ag.emoji?esc(ag.emoji):`<i data-lucide="${ag.is_manager===false?'bot':'sparkles'}" class="text-sm" style="color:${hx}"></i>`;
  const avatar=mine
    ?`<div class="h-8 w-8 rounded-xl bg-white/[.06] grid place-items-center shrink-0 mt-0.5"><i data-lucide="user" class="text-slate-300 text-sm"></i></div>`
    :`<div class="h-8 w-8 rounded-xl grid place-items-center shrink-0 mt-0.5 text-base" style="background:${hx}29;box-shadow:inset 0 0 0 1px ${hx}59">${face}</div>`;
  const when=`<span class="text-[10px] text-slate-600 font-normal" id="${id}-ts" title="${esc(ts||'')}">${ts?' · '+fmtTS(ts):''}</span>`;
  $('#msgs').insertAdjacentHTML('beforeend',`<div class="chat-row rise ${mine?'flex-row-reverse':''}">
    ${avatar}<div class="max-w-[78%] min-w-0 ${mine?'flex flex-col items-end':''}">
      <div class="chat-name ${mine?'pr-1':''}">${mine?'You':esc(ag.name||'MSP AI')}${when}</div>
      <div id="${id}" class="bub ${mine?'bub-you':'bub-ai prose-chat'}">${html}</div>
    </div></div>`);
  $('#msgs').scrollTop=1e9;icons();return id;}

(async()=>{loadBranding();try{await loadMe();if(!ME)throw 0;showApp();loadClients();route('overview');}catch(_){showLogin();}})();
</script>
