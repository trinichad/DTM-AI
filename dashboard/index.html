<!doctype html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DTM AI — MSP Operations</title>
  <script src="/vendor/tailwind.js"></script>
  <script src="/vendor/lucide.js"></script>
  <script>
    tailwind.config = { darkMode: 'class', theme: { extend: {
      colors: { ink:'#0a0e16', panel:'#0f1521', edge:'#1c2638', accent:'#6366f1', accent2:'#8b5cf6' },
      fontFamily: { sans: ['Inter','ui-sans-serif','system-ui','sans-serif'] },
      keyframes: {
        fadeup: { '0%':{opacity:0,transform:'translateY(8px)'}, '100%':{opacity:1,transform:'translateY(0)'} },
        pulseDot: { '0%,100%':{opacity:1}, '50%':{opacity:.3} },
        blink: { '0%,80%,100%':{opacity:.2}, '40%':{opacity:1} },
      },
      animation: { fadeup:'fadeup .35s ease both', pulseDot:'pulseDot 1.8s ease-in-out infinite' },
    } } };
  </script>
  <link rel="stylesheet" href="/vendor/fonts.css">
  <style>
    body{font-family:Inter,system-ui,sans-serif;background:
      radial-gradient(1100px 600px at 12% -8%, rgba(99,102,241,.16), transparent 60%),
      radial-gradient(900px 500px at 100% 0%, rgba(139,92,246,.12), transparent 55%),
      #0a0e16; min-height:100vh;}
    ::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:#26324a;border-radius:9px}
    ::-webkit-scrollbar-thumb:hover{background:#33415c}
    .glass{background:rgba(15,21,33,.72);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px)}
    .pill{font-size:11px;padding:2px 9px;border-radius:9999px;font-weight:600;letter-spacing:.02em}
    .card{background:linear-gradient(180deg,rgba(255,255,255,.035),rgba(255,255,255,0));
      border:1px solid rgba(255,255,255,.07);border-radius:16px}
    .card-hover{transition:transform .18s ease,border-color .18s ease,box-shadow .18s ease}
    .card-hover:hover{transform:translateY(-2px);border-color:rgba(99,102,241,.4);
      box-shadow:0 12px 40px -12px rgba(99,102,241,.35)}
    .grad{background:linear-gradient(135deg,#6366f1,#8b5cf6)}
    .grad-text{background:linear-gradient(135deg,#a5b4fc,#c4b5fd);-webkit-background-clip:text;background-clip:text;color:transparent}
    .switch{position:relative;width:40px;height:22px;border-radius:9999px;background:#26324a;transition:.2s;cursor:pointer;flex:none}
    .switch::after{content:'';position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:.2s}
    .switch.on{background:linear-gradient(135deg,#6366f1,#8b5cf6)}
    .switch.on::after{transform:translateX(18px)}
    .switch.disabled{opacity:.35;cursor:not-allowed}
    [data-lucide]{width:1em;height:1em;display:inline-block;vertical-align:-.125em}
    .navi{display:flex;align-items:center;gap:.6rem;padding:.55rem .7rem;border-radius:11px;cursor:pointer;color:#94a3b8;font-weight:500;font-size:.875rem;position:relative;transition:.15s}
    .navi:hover{background:rgba(255,255,255,.04);color:#e2e8f0}
    .navi.active{background:linear-gradient(90deg,rgba(99,102,241,.18),rgba(139,92,246,.06));color:#fff}
    .navi.active::before{content:'';position:absolute;left:0;top:18%;height:64%;width:3px;border-radius:3px;background:linear-gradient(180deg,#6366f1,#8b5cf6)}
  </style>
</head>
<body class="text-slate-200 antialiased">

<!-- LOGIN -->
<div id="login" class="hidden fixed inset-0 z-50 grid place-items-center">
  <form id="loginForm" class="card glass w-[22rem] p-8 space-y-5 animate-fadeup">
    <div class="flex items-center gap-3">
      <div class="h-11 w-11 rounded-2xl grad grid place-items-center font-extrabold text-white text-lg shadow-lg shadow-indigo-500/30">D</div>
      <div><div class="font-bold text-xl leading-none grad-text">DTM AI</div>
        <div class="text-xs text-slate-400 mt-1">MSP Operations Console</div></div>
    </div>
    <div class="space-y-3">
      <div class="relative"><i data-lucide="user" class="absolute left-3 top-3 text-slate-500"></i>
        <input id="u" placeholder="username" autocomplete="username" value="admin"
          class="w-full bg-ink/80 border border-edge rounded-xl pl-10 pr-3 py-2.5 text-sm focus:border-accent focus:outline-none"/></div>
      <div class="relative"><i data-lucide="lock" class="absolute left-3 top-3 text-slate-500"></i>
        <input id="p" type="password" placeholder="password" autocomplete="current-password"
          class="w-full bg-ink/80 border border-edge rounded-xl pl-10 pr-3 py-2.5 text-sm focus:border-accent focus:outline-none"/></div>
    </div>
    <button class="w-full grad text-white rounded-xl py-2.5 text-sm font-semibold shadow-lg shadow-indigo-500/25 hover:opacity-95 flex items-center justify-center gap-2">
      <i data-lucide="log-in"></i> Sign in</button>
    <div id="loginErr" class="text-rose-400 text-xs h-4 text-center"></div>
  </form>
</div>

<!-- APP -->
<div id="app" class="hidden h-screen overflow-hidden flex">
  <aside class="w-60 shrink-0 glass border-r border-edge flex flex-col">
    <div class="px-5 py-5 flex items-center gap-3">
      <div class="h-9 w-9 rounded-xl grad grid place-items-center font-extrabold text-white shadow-lg shadow-indigo-500/30">D</div>
      <div><div class="font-bold leading-none">DTM AI</div><div class="text-[10px] text-slate-500 mt-1 tracking-wide">MSP OPERATIONS</div></div>
    </div>
    <nav id="nav" class="flex-1 px-3 space-y-1 overflow-y-auto"></nav>
    <div class="px-3 pb-3 pt-2 space-y-2">
      <button id="userCard" class="w-full card p-2.5 flex items-center gap-2.5 text-left hover:border-accent/40 transition">
        <div id="userAvatar" class="h-8 w-8 rounded-full grad grid place-items-center text-xs font-bold text-white shrink-0">?</div>
        <div class="min-w-0"><div id="userName" class="text-sm font-medium truncate">—</div>
          <div id="userRole" class="text-[10px] text-slate-500 uppercase tracking-wide">—</div></div>
        <i data-lucide="settings" class="ml-auto text-slate-500"></i>
      </button>
      <div class="px-1 flex items-center gap-2 text-xs text-slate-400">
        <span class="h-2 w-2 rounded-full bg-emerald-400 animate-pulseDot"></span><span>System online</span>
        <button id="logout" class="ml-auto hover:text-slate-200 flex items-center gap-1"><i data-lucide="log-out"></i></button>
      </div>
    </div>
  </aside>

  <main class="flex-1 flex flex-col min-w-0">
    <header class="h-16 glass border-b border-edge flex items-center gap-3 px-6 sticky top-0 z-10">
      <div><div id="title" class="font-semibold text-[15px]">Overview</div>
        <div id="subtitle" class="text-xs text-slate-500"></div></div>
      <span class="pill bg-emerald-500/15 text-emerald-300 ml-1 flex items-center gap-1"><i data-lucide="shield-check" class="text-[13px]"></i> READ-ONLY</span>
      <div class="ml-auto flex items-center gap-2">
        <div class="relative"><i data-lucide="building-2" class="absolute left-3 top-2.5 text-slate-500 text-sm"></i>
          <input id="tenant" value="*" title="Client / tenant"
            class="w-36 bg-ink/70 border border-edge rounded-xl pl-9 pr-3 py-2 text-sm focus:border-accent focus:outline-none"/></div>
      </div>
    </header>
    <section id="view" class="flex-1 overflow-auto p-6"></section>
  </main>
</div>

<div id="toast" class="fixed bottom-5 right-5 z-50 space-y-2"></div>

<script>
const $ = s => document.querySelector(s);
let TENANT='*', current='overview';
const NAV=[['overview','Overview','layout-dashboard'],['chat','Chat','message-square'],
  ['integrations','Integrations','plug-zap'],['capabilities','Capabilities','sliders-horizontal'],
  ['skills','Skills','graduation-cap'],['memory','Memory','brain'],
  ['approvals','Approvals','shield-alert'],['build','Build','hammer'],['audit','Audit','scroll-text']];
const SUB={overview:'Live health across your clients',chat:'Ask about a client — read-only',
  integrations:'Connections, knowledge & credentials',capabilities:'Primitives the AI may use',
  skills:'What Hermes has learned',memory:'Knowledge base & per-client notes',
  approvals:'Write actions awaiting your sign-off',build:'Draft new tools — sandboxed, you approve',
  audit:'Every action, logged',settings:'Account & users'};
let ME=null, MODEL='';
// Chat transcripts persist in the browser (per client) until explicitly cleared — never on the server.
let CHAT={}; try{ CHAT=JSON.parse(localStorage.getItem('dtm_chat')||'{}')||{}; }catch(_){ CHAT={}; }
const chatKey=()=>TENANT||'*';
const chatLog=()=>(CHAT[chatKey()]=CHAT[chatKey()]||[]);
function chatSave(){ try{ localStorage.setItem('dtm_chat',JSON.stringify(CHAT)); }catch(_){} }
// Recent prior turns sent as context so the assistant remembers the conversation (capped; backend re-caps).
function chatHistory(){ return chatLog().slice(0,-1).filter(t=>t.role==='user'||(t.role==='assistant'&&!t.error&&t.answer))
  .map(t=>({role:t.role,content:t.role==='user'?t.text:t.answer})).slice(-20); }
function aiHtml(t){ let h=esc(t.answer||'');
  if(t.tools&&t.tools.length) h+=`<div class="mt-2 flex flex-wrap gap-1">`+t.tools.map(x=>
    `<span class="pill ${x.ok?'bg-emerald-500/15 text-emerald-300':'bg-rose-500/15 text-rose-300'} inline-flex items-center gap-1"><i data-lucide="${x.ok?'check':'x'}" class="text-[11px]"></i>${esc(x.name)}</span>`).join('')+`</div>`;
  if(t.citations&&t.citations.length) h+=`<div class="text-[11px] text-slate-500 mt-1.5 flex items-center gap-1"><i data-lucide="link"></i>${t.citations.map(esc).join(', ')}</div>`;
  if(t.meta) h+=`<div class="text-[11px] text-slate-600 mt-1">${esc(t.meta)}</div>`;
  return h; }
function renderChatLog(){ const box=$('#msgs'); if(!box)return; box.innerHTML='';
  for(const t of chatLog()) bubble(t.role==='user'?'you':'ai', t.role==='user'?esc(t.text):(t.error?'<span class="text-rose-400">error</span>':aiHtml(t)));
  box.scrollTop=1e9; icons(); }

function icons(){ if(window.lucide) lucide.createIcons(); }
async function api(m,p,b){const r=await fetch(p,{method:m,credentials:'same-origin',
  headers:{'Content-Type':'application/json'},body:b?JSON.stringify(b):undefined});
  if(r.status===401){showLogin();throw new Error('auth');}return r.json();}
function showLogin(){$('#login').classList.remove('hidden');$('#app').classList.add('hidden');icons();}
function showApp(){$('#login').classList.add('hidden');$('#app').classList.remove('hidden');}
function toast(msg,ok=true){const t=document.createElement('div');
  t.className=`card glass px-4 py-2.5 text-sm flex items-center gap-2 animate-fadeup ${ok?'text-emerald-300':'text-rose-300'}`;
  t.innerHTML=`<i data-lucide="${ok?'check-circle-2':'alert-circle'}"></i> ${msg}`;
  $('#toast').appendChild(t);icons();setTimeout(()=>t.remove(),2600);}
const esc=s=>String(s??'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

$('#loginForm').onsubmit=async e=>{e.preventDefault();
  try{const r=await api('POST','/api/login',{username:$('#u').value,password:$('#p').value});
    if(r.ok){showApp();await loadMe();route('overview');}else $('#loginErr').textContent=r.error||'login failed';}
  catch(_){$('#loginErr').textContent='login failed';}};
$('#logout').onclick=async()=>{await api('POST','/api/logout');showLogin();};
$('#userCard').onclick=()=>route('settings');
$('#tenant').onchange=e=>{TENANT=e.target.value.trim()||'*';route(current);};
async function loadMe(){ try{ ME=await api('GET','/api/me'); renderUser(); }catch(_){} }
function renderUser(){ if(!ME)return; $('#userName').textContent=ME.username;
  $('#userRole').textContent=ME.role; $('#userAvatar').textContent=(ME.username||'?')[0].toUpperCase(); }

function renderNav(){$('#nav').innerHTML=NAV.filter(n=>n[0]!=='build'||(ME&&ME.role==='admin')).map(([id,label,ic])=>{
  const badge=(id==='approvals'&&ME&&ME.pending_approvals)?`<span class="ml-auto pill bg-rose-500/20 text-rose-300">${ME.pending_approvals}</span>`:'';
  return `<a data-id="${id}" class="navi ${id===current?'active':''}"><i data-lucide="${ic}"></i><span>${label}</span>${badge}</a>`;}).join('');
  document.querySelectorAll('[data-id]').forEach(a=>a.onclick=()=>route(a.dataset.id));icons();}
function route(id){current=id;const n=NAV.find(x=>x[0]===id);
  $('#title').textContent=n?n[1]:(id.charAt(0).toUpperCase()+id.slice(1));
  $('#subtitle').textContent=SUB[id]||'';renderNav();$('#view').classList.remove('animate-fadeup');
  void $('#view').offsetWidth;$('#view').classList.add('animate-fadeup');VIEWS[id]();}

const catChip=c=>{const m={read:['sky','eye'],alert:['amber','bell'],write:['orange','pencil'],destructive:['rose','flame']}[c]||['slate','circle'];
  return `<span class="pill bg-${m[0]}-500/15 text-${m[0]}-300 inline-flex items-center gap-1"><i data-lucide="${m[1]}" class="text-[12px]"></i>${c}</span>`;}
const riskDot=r=>{const c={none:'slate',low:'emerald',medium:'amber',high:'rose'}[r]||'slate';
  return `<span class="inline-flex items-center gap-1 text-xs text-slate-400"><span class="h-1.5 w-1.5 rounded-full bg-${c}-400"></span>${r}</span>`;}
function ring(pct,color='#6366f1',size=54){const r=22,c=2*Math.PI*r,off=c*(1-pct);
  return `<svg width="${size}" height="${size}" viewBox="0 0 54 54" class="-rotate-90">
    <circle cx="27" cy="27" r="${r}" fill="none" stroke="#1c2638" stroke-width="5"/>
    <circle cx="27" cy="27" r="${r}" fill="none" stroke="${color}" stroke-width="5" stroke-linecap="round"
      stroke-dasharray="${c}" stroke-dashoffset="${off}"/></svg>`;}

const VIEWS={
  async overview(){
    const [tools,ints,aud]=await Promise.all([api('GET','/api/tools'),api('GET','/api/integrations'),
      api('GET','/api/audit?limit=8'+(TENANT!=='*'?'&tenant='+encodeURIComponent(TENANT):''))]);
    const T=tools.tools,I=ints.integrations;
    const cfg=I.filter(i=>i.configured).length, writes=T.filter(t=>t.allow_write).length;
    const stat=(ic,grad,val,label,sub)=>`<div class="card card-hover p-5">
      <div class="flex items-start justify-between">
        <div class="h-10 w-10 rounded-xl grid place-items-center text-white" style="background:${grad}"><i data-lucide="${ic}"></i></div>
        ${sub?`<span class="text-[11px] text-slate-500">${sub}</span>`:''}
      </div>
      <div class="text-3xl font-bold mt-4">${val}</div>
      <div class="text-sm text-slate-400">${label}</div></div>`;
    $('#view').innerHTML=`
      <div class="grid gap-4 md:grid-cols-4 mb-5">
        ${stat('wrench','linear-gradient(135deg,#6366f1,#8b5cf6)',T.length,'Capabilities','enabled tools')}
        ${stat('plug-zap','linear-gradient(135deg,#22d3ee,#3b82f6)',cfg+' / '+I.length,'Integrations','configured')}
        ${stat('shield-check','linear-gradient(135deg,#34d399,#10b981)',T.length-writes,'Read-only tools','safe by default')}
        ${stat('pencil','linear-gradient(135deg,#fb923c,#f43f5e)',writes,'Write-enabled','via console')}
      </div>
      <div class="grid gap-4 lg:grid-cols-3">
        <div class="card p-5 lg:col-span-2">
          <div class="flex items-center gap-2 mb-4 font-semibold"><i data-lucide="activity" class="text-accent"></i> Recent activity</div>
          <div class="space-y-2">${aud.audit.length?aud.audit.map(a=>`
            <div class="flex items-center gap-3 text-sm py-1.5 border-b border-edge/40">
              <i data-lucide="${a.result_ok?'check':a.result_ok===0?'x':'minus'}" class="${a.result_ok?'text-emerald-400':a.result_ok===0?'text-rose-400':'text-slate-500'}"></i>
              <span class="text-slate-300">${esc(a.tool||a.action)}</span>
              <span class="text-slate-500 text-xs">${esc(a.tenant_id)}</span>
              <span class="ml-auto text-slate-600 text-xs">${esc((a.ts||'').slice(11,19))}</span></div>`).join('')
            :'<div class="text-slate-500 text-sm py-6 text-center">No activity yet — try the Chat.</div>'}</div>
        </div>
        <div class="card p-5">
          <div class="flex items-center gap-2 mb-4 font-semibold"><i data-lucide="heart-pulse" class="text-accent"></i> Integration health</div>
          <div class="space-y-3">${I.map(i=>`<div class="flex items-center gap-3">
            <span class="h-2.5 w-2.5 rounded-full ${i.configured?'bg-emerald-400':'bg-slate-600'}"></span>
            <span class="text-sm">${esc(i.label)}</span>
            <span class="ml-auto pill ${i.configured?'bg-emerald-500/15 text-emerald-300':'bg-slate-600/30 text-slate-400'}">${i.configured?'ready':'not set'}</span>
          </div>`).join('')}</div>
        </div>
      </div>`;icons();
  },

  async chat(){
    const mm=await api('GET','/api/models'); const models=mm.models||[];
    if(!MODEL||!models.find(m=>m.id===MODEL)) MODEL=(models.find(m=>m.default)||models[0]||{}).id||'';
    $('#view').innerHTML=`<div class="max-w-3xl mx-auto flex flex-col h-full">
      <div class="flex items-center gap-2 mb-3">
        <i data-lucide="cpu" class="text-slate-500 text-sm"></i>
        <select id="model" class="bg-ink/70 border border-edge rounded-lg px-2.5 py-1.5 text-xs focus:border-accent focus:outline-none">
          ${models.map(m=>`<option value="${esc(m.id)}" ${m.id===MODEL?'selected':''}>${esc(m.label)}${m.local?'':' ☁'}</option>`).join('')}
        </select>
        ${models.length<2?`<a class="text-[11px] text-slate-500 hover:text-slate-300 cursor-pointer" id="addModel">+ add a cloud model</a>`:''}
        <button id="clearChat" class="ml-auto text-[11px] text-slate-500 hover:text-rose-300 inline-flex items-center gap-1" title="Clear this client's chat history"><i data-lucide="trash-2" class="text-[12px]"></i> Clear</button>
      </div>
      <div id="msgs" class="flex-1 space-y-4 mb-3 overflow-auto"></div>
      <div id="suggest" class="flex flex-wrap gap-2 mb-3"></div>
      <form id="chatForm" class="card glass flex gap-2 p-2">
        <input id="msg" placeholder="Ask about ${esc(TENANT)} …"
          class="flex-1 bg-transparent px-3 py-2 text-sm focus:outline-none"/>
        <button class="grad text-white rounded-xl px-4 text-sm font-semibold flex items-center gap-1"><i data-lucide="send"></i></button>
      </form>
      <div class="text-[11px] text-slate-500 mt-2 flex items-center gap-1.5"><i data-lucide="shield-check"></i> Analysing only — DTM AI never changes client systems in this mode. ☁ = cloud model.</div></div>`;
    $('#model').onchange=e=>{MODEL=e.target.value;};
    if($('#addModel'))$('#addModel').onclick=()=>route('integrations');
    const sg=['How many assets does this client have?','Any open Huntress incidents?','Summarise this client’s security posture'];
    const showSuggest=()=>{ $('#suggest').innerHTML=chatLog().length?'':sg.map(s=>`<button class="pill bg-white/5 hover:bg-white/10 text-slate-300 border border-edge">${esc(s)}</button>`).join('');
      $('#suggest').querySelectorAll('button').forEach(b=>b.onclick=()=>{$('#msg').value=b.textContent;$('#msg').focus();}); };
    renderChatLog(); showSuggest();   // restore this client's saved transcript
    $('#clearChat').onclick=()=>{ CHAT[chatKey()]=[]; chatSave(); renderChatLog(); showSuggest(); };
    $('#chatForm').onsubmit=async e=>{e.preventDefault();const m=$('#msg').value.trim();if(!m)return;$('#msg').value='';
      chatLog().push({role:'user',text:m}); chatSave(); showSuggest();
      bubble('you',esc(m));const id=bubble('ai','<span class="inline-flex gap-1"><span class="dot">●</span><span class="dot">●</span><span class="dot">●</span></span>');
      document.querySelectorAll('#'+id+' .dot').forEach((d,i)=>{d.style.animation=`blink 1.2s ${i*.2}s infinite`;});
      try{const r=await api('POST','/api/chat',{tenant:TENANT,message:m,model:MODEL,history:chatHistory()});
        const turn={role:'assistant',answer:r.answer||'',tools:r.tool_events||[],citations:r.citations||[],meta:`${r.provider}/${r.model} · ${r.rounds} round(s)`};
        chatLog().push(turn); chatSave();
        document.getElementById(id).innerHTML=aiHtml(turn);icons();
      }catch(_){ chatLog().push({role:'assistant',error:true}); chatSave();
        document.getElementById(id).innerHTML='<span class="text-rose-400">error</span>';}};icons();
  },

  async integrations(){
    const {integrations}=await api('GET','/api/integrations');
    const ico={kaseya:'monitor-dot',cylance:'shield',huntress:'radar',obsidian:'notebook-pen',hermes:'bot',anthropic:'sparkles',openai:'bot'};
    const apiCards=integrations.filter(i=>i.kind==='api'), local=integrations.filter(i=>i.kind==='local'),
          llm=integrations.filter(i=>i.kind==='llm');
    const head=t=>`<div class="text-[11px] uppercase tracking-wide text-slate-500 mb-2 mt-1">${t}</div>`;
    const apiCard=i=>`<div class="card card-hover p-5" data-card="${esc(i.integration)}">
        <div class="flex items-center gap-3">
          <div class="relative grid place-items-center">${ring(i.configured?1:0.06,i.configured?'#10b981':'#475569')}
            <i data-lucide="${ico[i.integration]||'plug'}" class="absolute text-lg ${i.configured?'text-emerald-300':'text-slate-500'}"></i></div>
          <div><div class="font-semibold">${esc(i.label)}</div>
            <span class="pill ${i.configured?'bg-emerald-500/15 text-emerald-300':'bg-slate-600/30 text-slate-400'}">${i.configured?'configured':'not set'}</span></div>
        </div>
        <div class="fp text-[11px] text-slate-500 mt-3 font-mono leading-relaxed">${i.configured?Object.entries(i.fingerprints).map(([k,v])=>`${esc(k)}: ${esc(v)}`).join('<br>'):'missing: '+i.missing.map(esc).join(', ')}</div>
        <div class="grid grid-cols-2 gap-2 mt-4">
          <button data-int="${esc(i.integration)}" class="probe text-xs bg-white/5 hover:bg-white/10 border border-edge rounded-lg py-2 flex items-center justify-center gap-1.5"><i data-lucide="zap"></i> Test</button>
          <button data-int="${esc(i.integration)}" class="manage text-xs bg-white/5 hover:bg-white/10 border border-edge rounded-lg py-2 flex items-center justify-center gap-1.5"><i data-lucide="key-round"></i> Manage keys</button>
        </div>
        <div class="probe-res text-xs mt-2"></div><div class="creds mt-3"></div></div>`;
    const localCard=i=>`<div class="card card-hover p-5">
        <div class="flex items-center gap-3">

        <th class="text-left p-3 font-medium">Client</th><th class="text-left p-3 font-medium">Action</th>
        <th class="text-left p-3 font-medium">Tool</th><th class="p-3 font-medium">Result</th></tr></thead><tbody>`+
      (audit.length?audit.map(a=>`<tr class="border-b border-edge/30 hover:bg-white/[.02]">
        <td class="p-3 text-slate-500 font-mono text-xs">${esc((a.ts||'').slice(0,19).replace('T',' '))}</td>
        <td class="p-3">${esc(a.actor)}</td><td class="p-3 text-slate-400">${esc(a.tenant_id)}</td>
        <td class="p-3"><span class="pill bg-white/5 text-slate-300">${esc(a.action)}</span></td>
        <td class="p-3 text-slate-300">${esc(a.tool||'—')}</td>
        <td class="p-3 text-center">${a.result_ok==null?'<span class="text-slate-600">·</span>':(a.result_ok?'<i data-lucide="check-circle-2" class="text-emerald-400"></i>':'<i data-lucide="x-circle" class="text-rose-400"></i>')}</td></tr>`).join('')
        :'<tr><td colspan="6" class="text-center text-slate-500 py-10">No audit entries yet.</td></tr>')+
      `</tbody></table></div>`;icons();
  },
};

async function editUser(username, role, email){
  const newRole=prompt(`Role for ${username} (admin or user):`, role); if(newRole===null) return;
  const newEmail=prompt(`Email for ${username} (blank = none):`, email||''); if(newEmail===null) return;
  const newPass=prompt(`New password for ${username} (blank = keep current):`, '');
  const body={role:newRole.trim(), email:newEmail.trim()}; if(newPass) body.password=newPass;
  const r=await api('POST','/api/users/'+encodeURIComponent(username), body);
  r.ok?(toast('user updated'),route('settings')):toast(esc(r.error),false);
}
async function toggleCreds(integration, box){
  if(box.dataset.open==='1'){ box.innerHTML=''; box.dataset.open=''; return; }
  box.dataset.open='1';
  const {fields,label}=await api('GET','/api/integrations/'+encodeURIComponent(integration)+'/fields');
  box.innerHTML=`<div class="border-t border-edge pt-3 space-y-2">
    <div class="text-[11px] text-slate-500 flex items-center gap-1"><i data-lucide="shield-check"></i> Stored 0600, shown only as a fingerprint. Leave blank to keep current.</div>
    ${fields.map(f=>`<div>
      <label class="text-xs text-slate-400 flex items-center gap-1">${esc(f.key)}${f.required?'<span class="text-rose-400">*</span>':''}
        ${f.set?`<span class="ml-auto text-[10px] text-slate-600 font-mono">${esc(f.fingerprint)}</span>`:''}</label>
      <input data-key="${esc(f.key)}" type="password" autocomplete="new-password"
        placeholder="${f.set?'•••••• (set)':'not set'}"
        class="cred-in w-full bg-ink/80 border border-edge rounded-lg px-3 py-1.5 text-sm mt-1 focus:border-accent focus:outline-none"/></div>`).join('')}
    <div class="flex gap-2 pt-1">
      <button class="cred-save grad text-white rounded-lg px-3 py-1.5 text-xs font-semibold flex-1 flex items-center justify-center gap-1"><i data-lucide="save"></i> Save</button>
      <button class="cred-cancel bg-white/5 border border-edge rounded-lg px-3 py-1.5 text-xs">Cancel</button>
    </div></div>`;
  box.querySelector('.cred-cancel').onclick=()=>{box.innerHTML='';box.dataset.open='';};
  box.querySelector('.cred-save').onclick=async()=>{
    const vals={}; box.querySelectorAll('.cred-in').forEach(inp=>{ if(inp.value!=='') vals[inp.dataset.key]=inp.value; });
    if(!Object.keys(vals).length){ toast('nothing to save',false); return; }
    const r=await api('POST','/api/integrations/'+encodeURIComponent(integration)+'/credentials',vals);
    if(r.error){ toast(esc(r.error),false); return; }
    toast(`${label} credentials saved`); box.innerHTML=''; box.dataset.open=''; VIEWS.integrations();
  };
  icons();
}
function toggle(name,field,val,disabled,label){
  return `<div class="flex flex-col items-center gap-1">
    <div class="switch ${val?'on':''} ${disabled?'disabled':''}" data-name="${esc(name)}" data-field="${field}"></div>
    <span class="text-[10px] text-slate-600 md:hidden">${label}</span></div>`;}
function bubble(who,html){const id='m'+Math.random().toString(36).slice(2);const mine=who==='you';
  const avatar=mine?`<div class="h-8 w-8 rounded-full bg-edge grid place-items-center text-xs font-semibold shrink-0">You</div>`
    :`<div class="h-8 w-8 rounded-full grad grid place-items-center shrink-0 shadow-lg shadow-indigo-500/30"><i data-lucide="sparkles" class="text-white text-sm"></i></div>`;
  $('#msgs').insertAdjacentHTML('beforeend',`<div class="flex gap-3 ${mine?'flex-row-reverse':''} animate-fadeup">
    ${avatar}<div id="${id}" class="${mine?'bg-accent/15 border-accent/20':'card glass'} border rounded-2xl px-4 py-2.5 max-w-[80%] text-sm leading-relaxed">${html}</div></div>`);
  $('#msgs').scrollTop=1e9;icons();return id;}

(async()=>{try{await loadMe();if(!ME)throw 0;showApp();route('overview');}catch(_){showLogin();}})();
