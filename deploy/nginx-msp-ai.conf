# MSP AI — nginx reverse proxy + HTTPS. Terminates TLS, forwards to the loopback app.
#   sudo cp deploy/nginx-msp-ai.conf /etc/nginx/sites-available/msp-ai
#   sudo ln -s /etc/nginx/sites-available/msp-ai /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d msp-ai.your-domain.com     # provisions the cert + 443 block
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name msp-ai.your-domain.com;
    # certbot rewrites this to redirect 80 -> 443 and add the TLS server block.

    # Only your team should reach this — restrict by source IP / VPN as appropriate:
    # allow 10.0.0.0/8;  deny all;

    client_max_body_size 5m;

    location / {
        proxy_pass http://127.0.0.1:8088;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;   # allow long agent/LLM responses
    }
}

# After HTTPS is set up, set MSPAI_COOKIE_SECURE=1 in /opt/msp-ai/.env and restart msp-ai
# so the session cookie is only sent over TLS.
